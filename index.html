<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>X·RAY VISION — Anatomical AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --panel: rgba(4, 14, 24, 0.85);
    --border: rgba(0, 220, 255, 0.25);
    --glow: #00dcff;
    --skeleton-color: #e8f4ff;
    --skeleton-glow: rgba(200,230,255,0.8);
    --muscle-color: #ff4a4a;
    --muscle-glow: rgba(255,74,74,0.7);
    --circulatory-color: #ff2244;
    --circulatory-glow: rgba(255,34,68,0.8);
    --nervous-color: #ffe44a;
    --nervous-glow: rgba(255,228,74,0.8);
    --ui-font: 'Orbitron', sans-serif;
    --mono: 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--glow);
    font-family: var(--ui-font);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,220,255,0.015) 2px,
      rgba(0,220,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* VIGNETTE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* VIDEO + CANVAS */
  #video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.55;
    filter: saturate(0.3) brightness(0.6) contrast(1.1);
    transform: scaleX(-1);
  }

  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* TOP BAR */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(to bottom, rgba(2,4,8,0.95), transparent);
  }

  #logo {
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
  }

  #logo span {
    color: white;
    font-weight: 400;
  }

  #status-badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--glow);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.75;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--glow);
    box-shadow: 0 0 8px var(--glow);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .dot.red { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
  .dot.yellow { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* SYSTEM TOGGLE */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px 20px 24px;
    background: linear-gradient(to top, rgba(2,4,8,0.98), transparent);
  }

  #system-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(0,220,255,0.5);
    text-transform: uppercase;
  }

  #system-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .sys-btn {
    font-family: var(--ui-font);
    font-size: clamp(9px, 1.8vw, 12px);
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s ease;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    min-width: 120px;
    text-align: center;
  }

  .sys-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .sys-btn:hover {
    color: white;
    border-color: rgba(255,255,255,0.3);
  }

  .sys-btn[data-sys="skeleton"].active,
  .sys-btn[data-sys="skeleton"]:hover {
    border-color: rgba(200,230,255,0.6);
    color: #e8f4ff;
    box-shadow: 0 0 15px rgba(200,230,255,0.2), inset 0 0 15px rgba(200,230,255,0.05);
  }

  .sys-btn[data-sys="muscular"].active,
  .sys-btn[data-sys="muscular"]:hover {
    border-color: rgba(255,74,74,0.6);
    color: #ff8888;
    box-shadow: 0 0 15px rgba(255,74,74,0.2), inset 0 0 15px rgba(255,74,74,0.05);
  }

  .sys-btn[data-sys="circulatory"].active,
  .sys-btn[data-sys="circulatory"]:hover {
    border-color: rgba(255,34,68,0.7);
    color: #ff6080;
    box-shadow: 0 0 15px rgba(255,34,68,0.25), inset 0 0 15px rgba(255,34,68,0.05);
  }

  .sys-btn[data-sys="nervous"].active,
  .sys-btn[data-sys="nervous"]:hover {
    border-color: rgba(255,228,74,0.6);
    color: #ffe44a;
    box-shadow: 0 0 15px rgba(255,228,74,0.2), inset 0 0 15px rgba(255,228,74,0.05);
  }

  .sys-btn .btn-icon {
    display: block;
    font-size: 16px;
    margin-bottom: 3px;
  }

  /* CORNER HUD */
  .hud-corner {
    position: fixed;
    z-index: 200;
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(0,220,255,0.45);
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  #hud-tl { top: 60px; left: 16px; }
  #hud-tr { top: 60px; right: 16px; text-align: right; }

  .hud-line { display: flex; gap: 6px; align-items: center; }
  .hud-val { color: rgba(0,220,255,0.8); }

  /* CORNER BRACKETS */
  .bracket {
    position: fixed;
    width: 40px; height: 40px;
    z-index: 201;
    opacity: 0.4;
  }
  #br-tl { top: 8px; left: 8px; border-top: 1px solid var(--glow); border-left: 1px solid var(--glow); }
  #br-tr { top: 8px; right: 8px; border-top: 1px solid var(--glow); border-right: 1px solid var(--glow); }
  #br-bl { bottom: 8px; left: 8px; border-bottom: 1px solid var(--glow); border-left: 1px solid var(--glow); }
  #br-br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--glow); border-right: 1px solid var(--glow); }

  /* LOADING SCREEN */
  #loading {
    position: fixed;
    inset: 0;
    background: #020408;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transition: opacity 0.8s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #loading-title {
    font-size: clamp(24px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--glow);
    text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(0,220,255,0.4);
    animation: flicker 3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.85; }
  }

  #loading-sub {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    color: rgba(0,220,255,0.6);
  }

  #loading-bar-wrap {
    width: min(340px, 80vw);
    height: 2px;
    background: rgba(0,220,255,0.15);
    border-radius: 1px;
    overflow: hidden;
  }

  #loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, transparent, var(--glow), white);
    box-shadow: 0 0 10px var(--glow);
    transition: width 0.3s ease;
  }

  #loading-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(0,220,255,0.45);
    min-height: 16px;
  }

  /* PERSON COUNT HUD */
  #person-hud {
    position: fixed;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(0,220,255,0.4);
  }

  #confidence-meter {
    width: 4px;
    height: 80px;
    background: rgba(0,220,255,0.1);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  #confidence-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--glow);
    box-shadow: 0 0 6px var(--glow);
    transition: height 0.3s ease;
    border-radius: 2px;
  }

  /* NO-POSE message */
  #no-pose {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(0,220,255,0.35);
    text-align: center;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  #no-pose.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">X·RAY</div>
  <div id="loading-sub">ANATOMICAL AUGMENTED REALITY</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Initializing systems...</div>
</div>

<div class="bracket" id="br-tl"></div>
<div class="bracket" id="br-tr"></div>
<div class="bracket" id="br-bl"></div>
<div class="bracket" id="br-br"></div>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="topbar">
  <div id="logo">X·<span>RAY</span> VISION</div>
  <div id="status-badge">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">INITIALIZING</span>
  </div>
</div>

<div id="hud-tl">
  <div class="hud-line">SYS <span class="hud-val" id="hud-sys">SKELETON</span></div>
  <div class="hud-line">FPS <span class="hud-val" id="hud-fps">--</span></div>
  <div class="hud-line">POSE <span class="hud-val" id="hud-pose">--</span></div>
</div>

<div id="hud-tr">
  <div class="hud-line" style="justify-content:flex-end;">RES <span class="hud-val" id="hud-res">--</span></div>
  <div class="hud-line" style="justify-content:flex-end;">CONF <span class="hud-val" id="hud-conf">--</span></div>
  <div class="hud-line" style="justify-content:flex-end;">BODIES <span class="hud-val" id="hud-bodies">0</span></div>
</div>

<div id="person-hud">
  <span>CONF</span>
  <div id="confidence-meter"><div id="confidence-fill" style="height:0%"></div></div>
  <span id="conf-pct">0%</span>
</div>

<div id="no-pose">[ STAND IN FRONT OF CAMERA ]</div>

<div id="controls">
  <div id="system-label">◈ SELECT ANATOMICAL SYSTEM ◈</div>
  <div id="system-buttons">
    <button class="sys-btn active" data-sys="skeleton">
      <span class="btn-icon">🦴</span>SKELETON
    </button>
    <button class="sys-btn" data-sys="muscular">
      <span class="btn-icon">💪</span>MUSCULAR
    </button>
    <button class="sys-btn" data-sys="circulatory">
      <span class="btn-icon">🫀</span>CIRCULATORY
    </button>
    <button class="sys-btn" data-sys="nervous">
      <span class="btn-icon">⚡</span>NERVOUS
    </button>
  </div>
</div>

<!-- TensorFlow.js + MoveNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ============================================================
//  XRAY VISION — AR Anatomical Overlay
//  Uses MoveNet (TF.js) for real-time pose detection
//  Draws anatomically-styled overlays per body system
// ============================================================

const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

let detector = null;
let activeSystem = 'skeleton';
let lastPoses = [];
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;
let animFrameId = null;
let poseConfidence = 0;

// ── MoveNet keypoint indices ──────────────────────────────
const KP = {
  NOSE: 0, L_EYE: 1, R_EYE: 2, L_EAR: 3, R_EAR: 4,
  L_SHOULDER: 5, R_SHOULDER: 6,
  L_ELBOW: 7, R_ELBOW: 8,
  L_WRIST: 9, R_WRIST: 10,
  L_HIP: 11, R_HIP: 12,
  L_KNEE: 13, R_KNEE: 14,
  L_ANKLE: 15, R_ANKLE: 16
};

// ── Utility: get keypoint position (mirrored) ─────────────
function kp(keypoints, idx, cw, ch) {
  const k = keypoints[idx];
  if (!k || k.score < 0.25) return null;
  // Mirror X because video is CSS-flipped
  return { x: cw - (k.x / video.videoWidth) * cw, y: (k.y / video.videoHeight) * ch, s: k.score };
}

function kpRaw(keypoints, idx) {
  const k = keypoints[idx];
  return (k && k.score > 0.2) ? k : null;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function midpt(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

// ─────────────────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────────────────
function setGlow(color, blur, alpha = 1) {
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.globalAlpha = alpha;
}

function drawLine(a, b, color, width, blur = 8) {
  if (!a || !b) return;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.restore();
}

function drawCircle(c, r, color, fill = false, blur = 10) {
  if (!c) return;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  if (fill) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// Draw ellipse oriented along angle
function drawEllipse(cx, cy, rx, ry, rot, color, lineWidth, blur = 8) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// Thick bone segment with cortical shading
function drawBone(a, b, color, thickness, blur = 14) {
  if (!a || !b) return;
  const d = dist(a, b);
  const ang = angle(a, b);
  ctx.save();
  ctx.translate((a.x + b.x) / 2, (a.y + b.y) / 2);
  ctx.rotate(ang);
  // Outer glow
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.strokeStyle = color;
  ctx.lineWidth = thickness;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-d / 2, 0);
  ctx.lineTo(d / 2, 0);
  ctx.stroke();
  // Inner bright line
  ctx.shadowBlur = 4;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = thickness * 0.2;
  ctx.beginPath();
  ctx.moveTo(-d / 2 + 4, 0);
  ctx.lineTo(d / 2 - 4, 0);
  ctx.stroke();
  ctx.restore();
}

// Muscle belly (spindle shape)
function drawMuscle(a, b, color, width, blur = 12) {
  if (!a || !b) return;
  const d = dist(a, b);
  const ang = angle(a, b);
  const mid = midpt(a, b);
  ctx.save();
  ctx.translate(mid.x, mid.y);
  ctx.rotate(ang);
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  // Spindle
  ctx.moveTo(-d / 2, 0);
  ctx.bezierCurveTo(-d / 4, -width, d / 4, -width, d / 2, 0);
  ctx.bezierCurveTo(d / 4, width, -d / 4, width, -d / 2, 0);
  ctx.closePath();
  ctx.fill();
  // Fiber lines
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.8;
  for (let i = -2; i <= 2; i++) {
    const fy = (i / 3) * width * 0.7;
    ctx.beginPath();
    ctx.moveTo(-d / 2 * 0.7, fy);
    ctx.lineTo(d / 2 * 0.7, fy);
    ctx.stroke();
  }
  ctx.restore();
}

// Vessel (artery/vein) with pulse animation
function drawVessel(points, color, width, blur = 8) {
  if (points.length < 2) return;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length - 1; i++) {
    const cpx = (points[i].x + points[i + 1].x) / 2;
    const cpy = (points[i].y + points[i + 1].y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, cpx, cpy);
  }
  ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
  ctx.stroke();
  ctx.restore();
}

// Nerve fiber (dashed, branching)
function drawNerve(a, b, color, width, blur = 6) {
  if (!a || !b) return;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.setLineDash([6, 4]);
  ctx.lineDashOffset = -(Date.now() / 60) % 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  // Slight curve for nerve
  const cp = {
    x: lerp(a.x, b.x, 0.5) + (b.y - a.y) * 0.08,
    y: lerp(a.y, b.y, 0.5) - (b.x - a.x) * 0.08
  };
  ctx.quadraticCurveTo(cp.x, cp.y, b.x, b.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────
//  SKELETON SYSTEM
// ─────────────────────────────────────────────────────────
function drawSkeleton(keypoints, cw, ch) {
  const C = '#c8dcf0';
  const CG = 'rgba(200,220,255,0.9)';
  const scale = cw / 640;
  const boneW = Math.max(4, 7 * scale);
  const jointR = Math.max(5, 8 * scale);

  const get = (i) => kp(keypoints, i, cw, ch);

  const nose = get(KP.NOSE), lEye = get(KP.L_EYE), rEye = get(KP.R_EYE);
  const lEar = get(KP.L_EAR), rEar = get(KP.R_EAR);
  const lSh = get(KP.L_SHOULDER), rSh = get(KP.R_SHOULDER);
  const lEl = get(KP.L_ELBOW), rEl = get(KP.R_ELBOW);
  const lWr = get(KP.L_WRIST), rWr = get(KP.R_WRIST);
  const lHi = get(KP.L_HIP), rHi = get(KP.R_HIP);
  const lKn = get(KP.L_KNEE), rKn = get(KP.R_KNEE);
  const lAn = get(KP.L_ANKLE), rAn = get(KP.R_ANKLE);

  // ── SKULL ──────────────────────────────────────────
  if (nose) {
    const headR = jointR * 3.5;
    // Cranium
    ctx.save();
    ctx.shadowColor = CG; ctx.shadowBlur = 18;
    ctx.strokeStyle = C; ctx.lineWidth = boneW * 0.7;
    ctx.beginPath();
    ctx.arc(nose.x, nose.y - headR * 0.6, headR, Math.PI * 0.1, Math.PI * 0.9, true);
    ctx.stroke();
    // Jawline
    ctx.beginPath();
    ctx.arc(nose.x, nose.y - headR * 0.2, headR * 0.65, Math.PI * 0.1, Math.PI * 0.9);
    ctx.stroke();
    // Eye sockets
    if (lEye) drawEllipse(lEye.x, lEye.y, jointR * 1.4, jointR, 0, C, boneW * 0.5, 12);
    if (rEye) drawEllipse(rEye.x, rEye.y, jointR * 1.4, jointR, 0, C, boneW * 0.5, 12);
    // Nose bridge
    ctx.strokeStyle = C; ctx.lineWidth = boneW * 0.4;
    ctx.beginPath();
    ctx.moveTo(nose.x, nose.y - jointR * 1.2);
    ctx.lineTo(nose.x, nose.y + jointR * 0.5);
    ctx.stroke();
    ctx.restore();
  }

  // ── SPINE ──────────────────────────────────────────
  if (lSh && rSh && lHi && rHi) {
    const topSpine = midpt(lSh, rSh);
    const botSpine = midpt(lHi, rHi);
    const vertebraCount = 8;
    for (let i = 0; i <= vertebraCount; i++) {
      const t = i / vertebraCount;
      const vx = lerp(topSpine.x, botSpine.x, t);
      const vy = lerp(topSpine.y, botSpine.y, t);
      drawCircle({ x: vx, y: vy }, jointR * 0.9, C, false, 8);
      if (i > 0) {
        const pt = (i - 1) / vertebraCount;
        const px = lerp(topSpine.x, botSpine.x, pt);
        const py = lerp(topSpine.y, botSpine.y, pt);
        drawLine({ x: px, y: py }, { x: vx, y: vy }, C, boneW * 0.5, 6);
      }
    }
  }

  // ── RIBCAGE ────────────────────────────────────────
  if (lSh && rSh && lHi && rHi) {
    const topC = midpt(lSh, rSh);
    const botC = midpt(lHi, rHi);
    const ribCount = 6;
    for (let i = 1; i <= ribCount; i++) {
      const t = i / (ribCount + 1);
      const cy = lerp(topC.y + (botC.y - topC.y) * 0.05, botC.y - (botC.y - topC.y) * 0.15, t);
      const cx = lerp(topC.x, botC.x, t);
      const ribW = dist(lSh, rSh) * lerp(0.52, 0.45, t);
      const ribH = (botC.y - topC.y) * 0.09;
      ctx.save();
      ctx.shadowColor = C; ctx.shadowBlur = 10;
      ctx.strokeStyle = C; ctx.lineWidth = boneW * 0.55;
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      ctx.ellipse(cx, cy, ribW, ribH, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── CLAVICLES ──────────────────────────────────────
  if (lSh && rSh) {
    const top = midpt(lSh, rSh);
    top.y -= jointR * 0.5;
    drawBone(top, lSh, C, boneW * 0.6, 12);
    drawBone(top, rSh, C, boneW * 0.6, 12);
  }

  // ── PELVIS ─────────────────────────────────────────
  if (lHi && rHi) {
    drawBone(lHi, rHi, C, boneW * 0.9, 14);
    const pelC = midpt(lHi, rHi);
    const pelW = dist(lHi, rHi) * 0.55;
    ctx.save();
    ctx.shadowColor = C; ctx.shadowBlur = 12;
    ctx.strokeStyle = C; ctx.lineWidth = boneW * 0.5;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.ellipse(pelC.x, pelC.y + pelW * 0.3, pelW, pelW * 0.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // ── ARMS ───────────────────────────────────────────
  drawBone(lSh, lEl, C, boneW, 16); // Humerus
  drawBone(rSh, rEl, C, boneW, 16);
  drawBone(lEl, lWr, C, boneW * 0.8, 12); // Radius/Ulna
  drawBone(rEl, rWr, C, boneW * 0.8, 12);

  // Hand bones
  if (lWr) {
    for (let a = -0.4; a <= 0.4; a += 0.2) {
      const fx = lWr.x + Math.cos(a + Math.PI * 0.5) * jointR * 2.5;
      const fy = lWr.y + Math.sin(a + Math.PI * 0.5) * jointR * 2.5;
      drawLine(lWr, { x: fx, y: fy }, C, boneW * 0.4, 8);
    }
  }
  if (rWr) {
    for (let a = -0.4; a <= 0.4; a += 0.2) {
      const fx = rWr.x + Math.cos(a - Math.PI * 0.5) * jointR * 2.5;
      const fy = rWr.y + Math.sin(a - Math.PI * 0.5) * jointR * 2.5;
      drawLine(rWr, { x: fx, y: fy }, C, boneW * 0.4, 8);
    }
  }

  // ── LEGS ───────────────────────────────────────────
  drawBone(lHi, lKn, C, boneW * 1.1, 16); // Femur
  drawBone(rHi, rKn, C, boneW * 1.1, 16);
  drawBone(lKn, lAn, C, boneW * 0.9, 12); // Tibia
  drawBone(rKn, rAn, C, boneW * 0.9, 12);

  // Foot
  if (lAn) {
    const footEnd = { x: lAn.x - jointR * 2, y: lAn.y + jointR * 1.5 };
    drawBone(lAn, footEnd, C, boneW * 0.6, 8);
  }
  if (rAn) {
    const footEnd = { x: rAn.x + jointR * 2, y: rAn.y + jointR * 1.5 };
    drawBone(rAn, footEnd, C, boneW * 0.6, 8);
  }

  // ── JOINTS ─────────────────────────────────────────
  const joints = [lSh, rSh, lEl, rEl, lWr, rWr, lHi, rHi, lKn, rKn, lAn, rAn];
  joints.forEach(j => {
    if (!j) return;
    drawCircle(j, jointR * 1.1, 'rgba(200,230,255,0.3)', true, 6);
    drawCircle(j, jointR * 1.1, C, false, 12);
  });

  // ── STERNUM ────────────────────────────────────────
  if (lSh && rSh && lHi && rHi) {
    const top = midpt(lSh, rSh); top.y += jointR;
    const bot = midpt(lHi, rHi); bot.y -= jointR;
    drawBone(top, bot, C, boneW * 0.5, 10);
  }
}

// ─────────────────────────────────────────────────────────
//  MUSCULAR SYSTEM
// ─────────────────────────────────────────────────────────
function drawMuscular(keypoints, cw, ch) {
  const C = '#ff5555';
  const CM = '#ff8844';
  const scale = cw / 640;

  const get = (i) => kp(keypoints, i, cw, ch);
  const lSh = get(KP.L_SHOULDER), rSh = get(KP.R_SHOULDER);
  const lEl = get(KP.L_ELBOW), rEl = get(KP.R_ELBOW);
  const lWr = get(KP.L_WRIST), rWr = get(KP.R_WRIST);
  const lHi = get(KP.L_HIP), rHi = get(KP.R_HIP);
  const lKn = get(KP.L_KNEE), rKn = get(KP.R_KNEE);
  const lAn = get(KP.L_ANKLE), rAn = get(KP.R_ANKLE);
  const nose = get(KP.NOSE);

  const mW = Math.max(14, 24 * scale);

  // Neck muscles
  if (nose && lSh && rSh) {
    drawMuscle(nose, lSh, CM, mW * 0.4, 10);
    drawMuscle(nose, rSh, CM, mW * 0.4, 10);
  }

  // Deltoids
  if (lSh && lEl) drawMuscle(lSh, lEl, CM, mW * 0.9, 14);
  if (rSh && rEl) drawMuscle(rSh, rEl, CM, mW * 0.9, 14);

  // Biceps / Triceps
  if (lEl && lWr) {
    drawMuscle(lEl, lWr, C, mW * 0.75, 12);
    const lElBack = { x: lEl.x + 6 * scale, y: lEl.y + 4 * scale };
    const lWrBack = { x: lWr.x + 5 * scale, y: lWr.y + 4 * scale };
    drawMuscle(lElBack, lWrBack, '#cc3333', mW * 0.55, 8);
  }
  if (rEl && rWr) {
    drawMuscle(rEl, rWr, C, mW * 0.75, 12);
    const rElBack = { x: rEl.x - 6 * scale, y: rEl.y + 4 * scale };
    const rWrBack = { x: rWr.x - 5 * scale, y: rWr.y + 4 * scale };
    drawMuscle(rElBack, rWrBack, '#cc3333', mW * 0.55, 8);
  }

  // Pectorals
  if (lSh && rSh && lHi && rHi) {
    const chest = midpt(lSh, rSh);
    const chestBot = { x: chest.x, y: chest.y + dist(lSh, rSh) * 0.45 };
    drawMuscle(lSh, { x: chest.x - 4 * scale, y: chestBot.y }, C, mW * 1.1, 16);
    drawMuscle(rSh, { x: chest.x + 4 * scale, y: chestBot.y }, C, mW * 1.1, 16);
  }

  // Abs (rectus abdominis)
  if (lSh && rSh && lHi && rHi) {
    const topAbs = { x: midpt(lSh, rSh).x, y: midpt(lSh, rSh).y + dist(lSh, rSh) * 0.35 };
    const botAbs = midpt(lHi, rHi);
    const abW = dist(lHi, rHi) * 0.18;
    for (let i = 0; i < 4; i++) {
      const t = i / 4;
      const ay = lerp(topAbs.y, botAbs.y, t);
      const ay2 = lerp(topAbs.y, botAbs.y, (i + 0.8) / 4);
      ctx.save();
      ctx.shadowColor = C; ctx.shadowBlur = 10;
      ctx.fillStyle = C; ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.ellipse(topAbs.x - abW, (ay + ay2) / 2, abW * 0.65, (ay2 - ay) * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(topAbs.x + abW, (ay + ay2) / 2, abW * 0.65, (ay2 - ay) * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Glutes
  if (lHi && rHi && lKn && rKn) {
    const pelC = midpt(lHi, rHi);
    drawMuscle(lHi, { x: pelC.x - 8 * scale, y: pelC.y + dist(lHi, rHi) * 0.4 }, CM, mW * 1.2, 16);
    drawMuscle(rHi, { x: pelC.x + 8 * scale, y: pelC.y + dist(lHi, rHi) * 0.4 }, CM, mW * 1.2, 16);
  }

  // Quadriceps
  if (lHi && lKn) drawMuscle(lHi, lKn, C, mW * 1.1, 16);
  if (rHi && rKn) drawMuscle(rHi, rKn, C, mW * 1.1, 16);

  // Hamstrings
  if (lHi && lKn) {
    const lHiB = { x: lHi.x + 6 * scale, y: lHi.y + 4 * scale };
    const lKnB = { x: lKn.x + 5 * scale, y: lKn.y - 4 * scale };
    drawMuscle(lHiB, lKnB, '#cc3333', mW * 0.7, 10);
  }
  if (rHi && rKn) {
    const rHiB = { x: rHi.x - 6 * scale, y: rHi.y + 4 * scale };
    const rKnB = { x: rKn.x - 5 * scale, y: rKn.y - 4 * scale };
    drawMuscle(rHiB, rKnB, '#cc3333', mW * 0.7, 10);
  }

  // Calves
  if (lKn && lAn) drawMuscle(lKn, lAn, C, mW * 0.85, 12);
  if (rKn && rAn) drawMuscle(rKn, rAn, C, mW * 0.85, 12);

  // Trapezius
  if (lSh && rSh) {
    const trap = { x: midpt(lSh, rSh).x, y: lSh.y - dist(lSh, rSh) * 0.25 };
    ctx.save();
    ctx.shadowColor = CM; ctx.shadowBlur = 14;
    ctx.fillStyle = CM; ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(trap.x, trap.y);
    ctx.lineTo(lSh.x - 5 * scale, lSh.y);
    ctx.lineTo(lSh.x, lSh.y + dist(lSh, rSh) * 0.25);
    ctx.lineTo(trap.x, trap.y + dist(lSh, rSh) * 0.35);
    ctx.lineTo(rSh.x, rSh.y + dist(lSh, rSh) * 0.25);
    ctx.lineTo(rSh.x + 5 * scale, rSh.y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  CIRCULATORY SYSTEM
// ─────────────────────────────────────────────────────────
const heartPhase = { t: 0 };
function drawCirculatory(keypoints, cw, ch) {
  const ART = '#ff2244'; // Arteries
  const VEN = '#4466ff'; // Veins
  const scale = cw / 640;
  heartPhase.t += 0.05;
  const beat = Math.pow(Math.max(0, Math.sin(heartPhase.t * 1.8)), 3) * 0.35 + 0.65;

  const get = (i) => kp(keypoints, i, cw, ch);
  const lSh = get(KP.L_SHOULDER), rSh = get(KP.R_SHOULDER);
  const lEl = get(KP.L_ELBOW), rEl = get(KP.R_ELBOW);
  const lWr = get(KP.L_WRIST), rWr = get(KP.R_WRIST);
  const lHi = get(KP.L_HIP), rHi = get(KP.R_HIP);
  const lKn = get(KP.L_KNEE), rKn = get(KP.R_KNEE);
  const lAn = get(KP.L_ANKLE), rAn = get(KP.R_ANKLE);
  const nose = get(KP.NOSE);

  const vW = Math.max(2, 3.5 * scale);

  // HEART
  if (lSh && rSh) {
    const hc = {
      x: lerp(lSh.x, rSh.x, 0.55),
      y: lSh.y + dist(lSh, rSh) * 0.3
    };
    const hr = dist(lSh, rSh) * 0.15 * beat;
    ctx.save();
    ctx.shadowColor = ART; ctx.shadowBlur = 20 * beat;
    ctx.fillStyle = ART; ctx.globalAlpha = 0.55 * beat;
    // Heart shape
    ctx.beginPath();
    ctx.moveTo(hc.x, hc.y + hr * 0.8);
    ctx.bezierCurveTo(hc.x - hr * 1.5, hc.y - hr, hc.x - hr * 2, hc.y - hr * 0.5, hc.x - hr, hc.y - hr * 1.5);
    ctx.bezierCurveTo(hc.x - hr * 0.3, hc.y - hr * 2, hc.x, hc.y - hr * 1.5, hc.x, hc.y - hr * 0.8);
    ctx.bezierCurveTo(hc.x, hc.y - hr * 1.5, hc.x + hr * 0.3, hc.y - hr * 2, hc.x + hr, hc.y - hr * 1.5);
    ctx.bezierCurveTo(hc.x + hr * 2, hc.y - hr * 0.5, hc.x + hr * 1.5, hc.y - hr, hc.x, hc.y + hr * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Aorta
    const aorta = { x: hc.x, y: hc.y - hr };
    const neck = nose ? { x: (nose.x + hc.x) / 2, y: (nose.y + hc.y) / 2 } : null;
    if (neck) {
      drawVessel([aorta, neck, nose], ART, vW * 1.4, 12);
    }
    // Pulmonary
    if (lSh) drawVessel([hc, midpt(hc, lSh), lSh], VEN, vW, 8);
    if (rSh) drawVessel([hc, midpt(hc, rSh), rSh], VEN, vW, 8);
  }

  // Arm arteries
  if (lSh && lEl) drawVessel([lSh, lEl], ART, vW * 1.1, 10);
  if (lEl && lWr) drawVessel([lEl, lWr], ART, vW, 8);
  if (rSh && rEl) drawVessel([rSh, rEl], ART, vW * 1.1, 10);
  if (rEl && rWr) drawVessel([rEl, rWr], ART, vW, 8);

  // Arm veins (slight offset)
  const off = 4 * scale;
  if (lSh && lEl) drawVessel([{ x: lSh.x + off, y: lSh.y }, { x: lEl.x + off, y: lEl.y }], VEN, vW * 0.8, 7);
  if (rSh && rEl) drawVessel([{ x: rSh.x - off, y: rSh.y }, { x: rEl.x - off, y: rEl.y }], VEN, vW * 0.8, 7);

  // Aorta to pelvis
  if (lSh && rSh && lHi && rHi) {
    const chest = midpt(lSh, rSh);
    const pelv = midpt(lHi, rHi);
    drawVessel([chest, { x: chest.x, y: (chest.y + pelv.y) / 2 }, pelv], ART, vW * 1.3, 12);
    drawVessel([{ x: chest.x + off, y: chest.y }, { x: pelv.x + off, y: pelv.y }], VEN, vW, 8);
  }

  // Iliac arteries → legs
  if (lHi && lKn) {
    drawVessel([lHi, midpt(lHi, lKn), lKn], ART, vW * 1.1, 10);
    drawVessel([{ x: lHi.x + off, y: lHi.y }, { x: lKn.x + off, y: lKn.y }], VEN, vW * 0.9, 7);
  }
  if (rHi && rKn) {
    drawVessel([rHi, midpt(rHi, rKn), rKn], ART, vW * 1.1, 10);
    drawVessel([{ x: rHi.x - off, y: rHi.y }, { x: rKn.x - off, y: rKn.y }], VEN, vW * 0.9, 7);
  }
  if (lKn && lAn) {
    drawVessel([lKn, midpt(lKn, lAn), lAn], ART, vW, 8);
    drawVessel([{ x: lKn.x + off, y: lKn.y }, { x: lAn.x + off, y: lAn.y }], VEN, vW * 0.7, 6);
  }
  if (rKn && rAn) {
    drawVessel([rKn, midpt(rKn, rAn), rAn], ART, vW, 8);
    drawVessel([{ x: rKn.x - off, y: rKn.y }, { x: rAn.x - off, y: rAn.y }], VEN, vW * 0.7, 6);
  }

  // Pulsing nodes at major junctions
  const nodes = [lSh, rSh, lHi, rHi, lKn, rKn];
  nodes.forEach(n => {
    if (!n) return;
    const pr = (Math.max(4, 7 * scale)) * (beat * 0.3 + 0.7);
    ctx.save();
    ctx.shadowColor = ART; ctx.shadowBlur = 12 * beat;
    ctx.fillStyle = ART; ctx.globalAlpha = 0.5 * beat;
    ctx.beginPath(); ctx.arc(n.x, n.y, pr, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
  });
}

// ─────────────────────────────────────────────────────────
//  NERVOUS SYSTEM
// ─────────────────────────────────────────────────────────
function drawNervous(keypoints, cw, ch) {
  const C = '#ffe855';
  const CB = '#ffaa00';
  const scale = cw / 640;
  const nW = Math.max(1.5, 2.5 * scale);

  const get = (i) => kp(keypoints, i, cw, ch);
  const nose = get(KP.NOSE);
  const lSh = get(KP.L_SHOULDER), rSh = get(KP.R_SHOULDER);
  const lEl = get(KP.L_ELBOW), rEl = get(KP.R_ELBOW);
  const lWr = get(KP.L_WRIST), rWr = get(KP.R_WRIST);
  const lHi = get(KP.L_HIP), rHi = get(KP.R_HIP);
  const lKn = get(KP.L_KNEE), rKn = get(KP.R_KNEE);
  const lAn = get(KP.L_ANKLE), rAn = get(KP.R_ANKLE);

  // Brain
  if (nose) {
    const br = dist(lSh || nose, rSh || nose) * 0.25 || 30 * scale;
    ctx.save();
    ctx.shadowColor = C; ctx.shadowBlur = 22;
    ctx.strokeStyle = C; ctx.lineWidth = nW * 1.2;
    // Left hemisphere
    ctx.beginPath();
    ctx.arc(nose.x - br * 0.35, nose.y - br * 0.8, br * 0.65, Math.PI * 0.8, Math.PI * 2.2);
    ctx.stroke();
    // Right hemisphere
    ctx.beginPath();
    ctx.arc(nose.x + br * 0.35, nose.y - br * 0.8, br * 0.65, Math.PI * 0.8, Math.PI * 2.2);
    ctx.stroke();
    // Folds
    ctx.lineWidth = nW * 0.5; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(nose.x - br * 0.3, nose.y - br * 0.8, br * 0.3 + i * 7 * scale, Math.PI, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
    // Brainstem
    if (lSh && rSh) {
      const neck = midpt(lSh, rSh);
      neck.y -= dist(lSh, rSh) * 0.3;
      drawNerve(nose, neck, C, nW * 1.2, 14);
    }
  }

  // Spinal cord
  if (lSh && rSh && lHi && rHi) {
    const topS = midpt(lSh, rSh);
    const botS = midpt(lHi, rHi);
    ctx.save();
    ctx.shadowColor = C; ctx.shadowBlur = 12;
    ctx.strokeStyle = C; ctx.lineWidth = nW * 1.5;
    ctx.setLineDash([8, 4]);
    ctx.lineDashOffset = -(Date.now() / 50) % 12;
    ctx.beginPath();
    ctx.moveTo(topS.x, topS.y);
    ctx.lineTo(botS.x, botS.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    // Nerve roots
    const roots = 6;
    for (let i = 0; i < roots; i++) {
      const t = (i + 0.5) / roots;
      const rx = lerp(topS.x, botS.x, t);
      const ry = lerp(topS.y, botS.y, t);
      const side = dist(lSh, rSh) * 0.28;
      drawNerve({ x: rx, y: ry }, { x: rx - side, y: ry }, C, nW * 0.8, 8);
      drawNerve({ x: rx, y: ry }, { x: rx + side, y: ry }, C, nW * 0.8, 8);
    }
  }

  // Brachial plexus → arms
  drawNerve(lSh, lEl, C, nW * 1.1, 10);
  drawNerve(rSh, rEl, C, nW * 1.1, 10);
  drawNerve(lEl, lWr, C, nW, 8);
  drawNerve(rEl, rWr, C, nW, 8);
  // Finger nerves
  if (lWr) {
    for (let a = -0.4; a <= 0.4; a += 0.2) {
      const fx = lWr.x + Math.cos(a + Math.PI * 0.5) * 25 * scale;
      const fy = lWr.y + Math.sin(a + Math.PI * 0.5) * 25 * scale;
      drawNerve(lWr, { x: fx, y: fy }, C, nW * 0.6, 6);
    }
  }
  if (rWr) {
    for (let a = -0.4; a <= 0.4; a += 0.2) {
      const fx = rWr.x + Math.cos(a - Math.PI * 0.5) * 25 * scale;
      const fy = rWr.y + Math.sin(a - Math.PI * 0.5) * 25 * scale;
      drawNerve(rWr, { x: fx, y: fy }, C, nW * 0.6, 6);
    }
  }

  // Femoral / sciatic nerves
  drawNerve(lHi, lKn, CB, nW * 1.2, 12);
  drawNerve(rHi, rKn, CB, nW * 1.2, 12);
  drawNerve(lKn, lAn, C, nW, 8);
  drawNerve(rKn, rAn, C, nW, 8);

  // Firing nodes
  const t = Date.now();
  [nose, lSh, rSh, lEl, rEl, lHi, rHi, lKn, rKn].forEach((n, i) => {
    if (!n) return;
    const pulse = (Math.sin(t / 300 + i * 1.3) + 1) / 2;
    ctx.save();
    ctx.shadowColor = C; ctx.shadowBlur = 15 * pulse;
    ctx.fillStyle = C; ctx.globalAlpha = 0.5 + 0.5 * pulse;
    const nr = Math.max(3, 5 * scale) * (0.7 + 0.3 * pulse);
    ctx.beginPath(); ctx.arc(n.x, n.y, nr, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
  });
}

// ─────────────────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────────────────
function renderPoses(poses) {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  if (!poses || poses.length === 0) {
    document.getElementById('no-pose').classList.remove('hidden');
    document.getElementById('hud-bodies').textContent = '0';
    document.getElementById('hud-pose').textContent = '--';
    document.getElementById('hud-conf').textContent = '--';
    document.getElementById('confidence-fill').style.height = '0%';
    document.getElementById('conf-pct').textContent = '0%';
    poseConfidence = 0;
    return;
  }

  document.getElementById('no-pose').classList.add('hidden');
  document.getElementById('hud-bodies').textContent = poses.length;

  let maxConf = 0;
  poses.forEach(pose => {
    const kps = pose.keypoints;
    const avgConf = kps.reduce((s, k) => s + (k.score || 0), 0) / kps.length;
    maxConf = Math.max(maxConf, avgConf);

    switch (activeSystem) {
      case 'skeleton': drawSkeleton(kps, cw, ch); break;
      case 'muscular': drawMuscular(kps, cw, ch); break;
      case 'circulatory': drawCirculatory(kps, cw, ch); break;
      case 'nervous': drawNervous(kps, cw, ch); break;
    }
  });

  poseConfidence = maxConf;
  const confPct = Math.round(maxConf * 100);
  document.getElementById('hud-conf').textContent = confPct + '%';
  document.getElementById('hud-pose').textContent = poses[0] ? 'DETECTED' : '--';
  document.getElementById('confidence-fill').style.height = confPct + '%';
  document.getElementById('conf-pct').textContent = confPct + '%';
  document.getElementById('status-dot').className = 'dot';
  document.getElementById('status-text').textContent = 'TRACKING';
}

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
async function setLoadingStatus(text, pct) {
  document.getElementById('loading-status').textContent = text;
  document.getElementById('loading-bar').style.width = pct + '%';
}

async function init() {
  setLoadingStatus('Requesting camera access...', 10);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;

    setLoadingStatus('Camera connected. Loading TensorFlow...', 30);

    await new Promise(r => video.onloadedmetadata = r);
    video.play();

    setLoadingStatus('Loading MoveNet pose detection model...', 55);

    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {
        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
        enableSmoothing: true,
        enableTracking: true,
        trackerType: poseDetection.TrackerType.BoundingBox
      }
    );

    setLoadingStatus('Warming up neural network...', 80);

    // Warm up
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 192; tempCanvas.height = 192;
    await detector.estimatePoses(tempCanvas);

    setLoadingStatus('System ready.', 100);
    await new Promise(r => setTimeout(r, 500));

    document.getElementById('loading').classList.add('hidden');

    // Resize canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // HUD resolution
    document.getElementById('hud-res').textContent = video.videoWidth + '×' + video.videoHeight;

    // Detection loop
    async function loop() {
      if (video.readyState >= 2 && detector) {
        const poses = await detector.estimatePoses(video, {
          maxPoses: 3,
          flipHorizontal: false
        });
        renderPoses(poses);
        lastPoses = poses;

        // FPS
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime > 1000) {
          currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
          document.getElementById('hud-fps').textContent = currentFps;
          frameCount = 0;
          lastFpsTime = now;
        }
      }
      animFrameId = requestAnimationFrame(loop);
    }
    loop();

    document.getElementById('status-text').textContent = 'LIVE';

  } catch (err) {
    console.error(err);
    setLoadingStatus('Error: ' + err.message, 0);
    document.getElementById('status-dot').className = 'dot red';
    document.getElementById('status-text').textContent = 'ERROR';
    document.getElementById('loading-bar').style.background = '#ff4444';
  }
}

// ─────────────────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────────────────
document.querySelectorAll('.sys-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSystem = btn.dataset.sys;
    document.getElementById('hud-sys').textContent = activeSystem.toUpperCase();
  });
});

// Start
init();
</script>
