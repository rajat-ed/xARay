<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>X·RAY VISION — Anatomical AR</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#020408;--glow:#00dcff;--c1:#00dcff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--glow);font-family:'Orbitron',sans-serif;overflow:hidden;height:100vh;width:100vw;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,220,255,.01) 2px,rgba(0,220,255,.01) 4px);pointer-events:none;z-index:100;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.65) 100%);pointer-events:none;z-index:99;}
#app{position:relative;width:100vw;height:100vh;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.48;filter:saturate(.18) brightness(.48) contrast(1.25);transform:scaleX(-1);}
#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;}
/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:linear-gradient(to bottom,rgba(2,4,8,.96),transparent);}
#logo{font-size:clamp(12px,2.2vw,19px);font-weight:900;letter-spacing:.25em;color:var(--glow);text-shadow:0 0 18px var(--glow),0 0 35px var(--glow);}
#logo span{color:#fff;font-weight:400;}
#sbadge{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--glow);display:flex;align-items:center;gap:7px;opacity:.68;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--glow);box-shadow:0 0 7px var(--glow);animation:pd 1.5s ease-in-out infinite;}
.dot.red{background:#f44;box-shadow:0 0 7px #f44;}.dot.yellow{background:#fc0;box-shadow:0 0 7px #fc0;}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
/* CONTROLS */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;flex-direction:column;align-items:center;gap:9px;padding:11px 16px 18px;background:linear-gradient(to top,rgba(2,4,8,.97),transparent);}
#slabel{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.28em;color:rgba(0,220,255,.38);}
#sbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.sb{font-family:'Orbitron',sans-serif;font-size:clamp(7px,1.4vw,10px);font-weight:700;letter-spacing:.1em;padding:7px 12px;border:1px solid rgba(0,220,255,.15);background:rgba(0,0,0,.5);color:rgba(255,255,255,.3);cursor:pointer;border-radius:2px;transition:all .15s;text-transform:uppercase;min-width:95px;text-align:center;}
.sb .si{display:block;font-size:13px;margin-bottom:2px;}
.sb[data-s="skeleton"].active{border-color:rgba(0,220,255,.7);color:var(--glow);box-shadow:0 0 10px rgba(0,220,255,.15);}
.sb[data-s="muscular"].active{border-color:rgba(255,80,80,.65);color:#ff8888;box-shadow:0 0 10px rgba(255,80,80,.15);}
.sb[data-s="circulatory"].active{border-color:rgba(255,34,68,.7);color:#ff6080;box-shadow:0 0 10px rgba(255,34,68,.2);}
.sb[data-s="nervous"].active{border-color:rgba(255,228,74,.6);color:#ffe44a;box-shadow:0 0 10px rgba(255,228,74,.15);}
.sb:hover{opacity:.8;filter:brightness(1.1);}
#arow{display:flex;align-items:center;gap:8px;}
#alabel{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,220,255,.35);letter-spacing:.08em;}
#aslider{-webkit-appearance:none;appearance:none;width:85px;height:2px;background:rgba(0,220,255,.15);border-radius:1px;outline:none;cursor:pointer;}
#aslider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--glow);box-shadow:0 0 5px var(--glow);cursor:pointer;}
/* HUD */
.hc{position:fixed;z-index:200;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,220,255,.35);line-height:1.9;letter-spacing:.04em;}
#htl{top:54px;left:12px;}#htr{top:54px;right:12px;text-align:right;}
.hv{color:rgba(0,220,255,.78);}
/* ANGLE INDICATOR */
#angle-hud{position:fixed;top:50%;left:14px;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:4px;}
#angle-dial{width:44px;height:44px;border-radius:50%;border:1px solid rgba(0,220,255,.2);position:relative;display:flex;align-items:center;justify-content:center;}
#angle-needle{position:absolute;width:2px;height:18px;background:linear-gradient(to top,var(--glow),transparent);border-radius:1px;transform-origin:bottom center;bottom:50%;left:50%;margin-left:-1px;box-shadow:0 0 4px var(--glow);transition:transform .15s;}
#angle-val{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,220,255,.45);letter-spacing:.05em;}
#view-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,220,255,.5);letter-spacing:.05em;text-align:center;}
/* CONF METER */
#cw{position:fixed;top:50%;right:12px;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:4px;align-items:center;}
#cm{width:3px;height:65px;background:rgba(0,220,255,.07);border-radius:2px;position:relative;overflow:hidden;}
#cf{position:absolute;bottom:0;left:0;right:0;background:var(--glow);box-shadow:0 0 4px var(--glow);transition:height .25s;border-radius:2px;}
.clab{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,220,255,.32);}
/* BRACKETS */
.bk{position:fixed;width:30px;height:30px;z-index:201;opacity:.28;}
#btl{top:6px;left:6px;border-top:1px solid var(--glow);border-left:1px solid var(--glow);}
#btr{top:6px;right:6px;border-top:1px solid var(--glow);border-right:1px solid var(--glow);}
#bbl{bottom:6px;left:6px;border-bottom:1px solid var(--glow);border-left:1px solid var(--glow);}
#bbr{bottom:6px;right:6px;border-bottom:1px solid var(--glow);border-right:1px solid var(--glow);}
/* NO POSE */
#np{position:fixed;bottom:105px;left:50%;transform:translateX(-50%);z-index:200;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.12em;color:rgba(0,220,255,.28);transition:opacity .4s;pointer-events:none;white-space:nowrap;}
#np.h{opacity:0;}
/* LOADING */
#loading{position:fixed;inset:0;background:#020408;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .7s ease;}
#loading.h{opacity:0;pointer-events:none;}
#ltitle{font-size:clamp(20px,5vw,46px);font-weight:900;letter-spacing:.3em;color:var(--glow);text-shadow:0 0 25px var(--glow),0 0 50px rgba(0,220,255,.3);animation:flk 3s ease-in-out infinite;}
@keyframes flk{0%,93%,100%{opacity:1}95%{opacity:.55}97%{opacity:.8}}
#lsub{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.18em;color:rgba(0,220,255,.45);}
#lbw{width:min(290px,76vw);height:2px;background:rgba(0,220,255,.08);border-radius:1px;overflow:hidden;}
#lb{height:100%;width:0%;background:linear-gradient(to right,transparent,var(--glow),#fff);box-shadow:0 0 8px var(--glow);transition:width .28s ease;}
#lst{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(0,220,255,.35);min-height:12px;}
</style>
</head>
<body>

<div id="loading">
  <div id="ltitle">X·RAY</div>
  <div id="lsub">MULTI-ANGLE ANATOMICAL AR</div>
  <div id="lbw"><div id="lb"></div></div>
  <div id="lst">Initializing...</div>
</div>

<div class="bk" id="btl"></div><div class="bk" id="btr"></div>
<div class="bk" id="bbl"></div><div class="bk" id="bbr"></div>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="topbar">
  <div id="logo">X·<span>RAY</span> VISION</div>
  <div id="sbadge"><div class="dot" id="sdot"></div><span id="stxt">INIT</span></div>
</div>

<div class="hc" id="htl">
  <div>SYS &nbsp;<span class="hv" id="h-sys">SKELETON</span></div>
  <div>FPS &nbsp;<span class="hv" id="h-fps">--</span></div>
  <div>BODIES <span class="hv" id="h-bod">0</span></div>
</div>
<div class="hc" id="htr">
  <div>RES <span class="hv" id="h-res">--</span></div>
  <div>CONF <span class="hv" id="h-conf">--</span></div>
  <div>VIEW <span class="hv" id="h-view">FRONT</span></div>
</div>

<div id="angle-hud">
  <div id="angle-dial"><div id="angle-needle"></div></div>
  <div id="view-label">FRONT</div>
  <div id="angle-val">0°</div>
</div>

<div id="cw">
  <span class="clab">CONF</span>
  <div id="cm"><div id="cf" style="height:0%"></div></div>
  <span class="clab" id="cpct">0%</span>
</div>

<div id="np">[ STAND IN FRONT OF CAMERA ]</div>

<div id="controls">
  <div id="slabel">◈ ANATOMICAL SYSTEM ◈</div>
  <div id="sbtns">
    <button class="sb active" data-s="skeleton"><span class="si">🦴</span>SKELETON</button>
    <button class="sb" data-s="muscular"><span class="si">💪</span>MUSCULAR</button>
    <button class="sb" data-s="circulatory"><span class="si">🫀</span>CIRCULATORY</button>
    <button class="sb" data-s="nervous"><span class="si">⚡</span>NERVOUS</button>
  </div>
  <div id="arow">
    <span id="alabel">OVERLAY α</span>
    <input type="range" id="aslider" min="15" max="100" value="80">
    <span class="clab" id="aval">80%</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

// ── Preload all images ──────────────────────────────────────────
const VIMGS = {};
const SIMGS = {};
let _loaded = 0, _total = 0;

function preloadAll() {
  return new Promise(resolve => {
    const allSrcs = [
      ...Object.entries(VIEWS).map(([k,v]) => [k, v.src, VIMGS]),
      ...Object.entries(SEGS).map(([k,v])  => [k, v.src || `data:image/png;base64,${v.data}`, SIMGS]),
    ];
    _total = allSrcs.length;
    allSrcs.forEach(([k, src, target]) => {
      const img = new Image();
      img.onload = img.onerror = () => { _loaded++; if(_loaded>=_total) resolve(); };
      img.src = src;
      target[k] = img;
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
//  KEYPOINTS
// ═══════════════════════════════════════════════════════════════════
const KP={NOSE:0,LEY:1,REY:2,LEA:3,REA:4,LSH:5,RSH:6,LEL:7,REL:8,LWR:9,RWR:10,LHI:11,RHI:12,LKN:13,RKN:14,LAN:15,RAN:16};

const video  = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
let detector=null, activeSystem='skeleton', overlayAlpha=0.80;
let frameCount=0, lastFpsTime=performance.now();
let heartPhase=0;
let smoothedKps = null;

// ── Geometry helpers ──────────────────────────────────────────────
function gkp(kps, i, cw, ch) {
  const k = kps[i];
  if(!k || k.score < 0.18) return null;
  return { x: cw-(k.x/video.videoWidth)*cw, y:(k.y/video.videoHeight)*ch, s:k.score };
}
const mid=(a,b)=>( {x:(a.x+b.x)/2,y:(a.y+b.y)/2} );
const dst=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
const ang=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const lrp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

// ── Keypoint smoother (exponential moving avg) ────────────────────
function smoothKps(raw) {
  if(!raw||raw.length===0) return null;
  if(!smoothedKps||smoothedKps.length!==raw[0].keypoints.length) {
    smoothedKps = raw[0].keypoints.map(k=>(...[Object.assign({},...[k])])[0]);
    return raw;
  }
  const A=0.5;
  smoothedKps = raw[0].keypoints.map((k,i) => {
    const p=smoothedKps[i];
    return {...k, x:lrp(p.x,k.x,A), y:lrp(p.y,k.y,A), score:lrp(p.score||0,k.score||0,A)};
  });
  return [{...raw[0], keypoints:smoothedKps}];
}

// ═══════════════════════════════════════════════════════════════════
//  ANGLE DETECTION
//  Determines viewing angle from shoulder/hip keypoint geometry
//  Returns: { angle: degrees 0=front 90=left 180=back 270=right,
//              blend: {front, side_l, back, side_r} weights }
// ═══════════════════════════════════════════════════════════════════
function detectViewAngle(kps, cw, ch) {
  const lSh = gkp(kps, KP.LSH, cw, ch);
  const rSh = gkp(kps, KP.RSH, cw, ch);
  const lHi = gkp(kps, KP.LHI, cw, ch);
  const rHi = gkp(kps, KP.RHI, cw, ch);

  // Default to front if insufficient data
  if(!lSh || !rSh) return { angle:0, label:'FRONT', blend:{front:1,side_l:0,back:0,side_r:0} };

  const shWidth  = Math.abs(rSh.x - lSh.x); // shoulder width in canvas px
  const shHeight = Math.abs(rSh.y - lSh.y); // shoulder vertical diff

  // "true" shoulder width estimated from hip width or torso height
  // The wider shoulders relative to foreshortening = more frontal
  // If rSh is to the LEFT of lSh (remember we're mirrored), person is turning
  
  // Shoulder asymmetry: which shoulder is higher?
  // In front view: shoulders at same height, both visible, wide
  // In side view: one shoulder largely hidden, very narrow width
  // In 3/4: intermediate
  
  // Compute aspect ratio of shoulder span
  const shSpan = dst(lSh, rSh);
  const bodyH  = (() => {
    const pts = [lSh, rSh, lHi, rHi].filter(Boolean);
    if(pts.length < 2) return cw * 0.3;
    const minY = Math.min(...pts.map(p=>p.y));
    const maxY = Math.max(...pts.map(p=>p.y));
    return maxY - minY || cw * 0.3;
  })();

  // Normalize shoulder span (0 = side-on, 1 = frontal)
  // Roughly: in frontal view shSpan ≈ 0.25 * bodyHeight * 2
  const normSpan = clamp(shSpan / (bodyH * 0.65), 0, 1);

  // Determine if facing left or right (which shoulder is more forward = lower in frame)
  // In left-side view: left shoulder appears forward (lower y in mirror)
  // In right-side view: right shoulder forward
  const facingRight = lSh.y > rSh.y + 5;  // left sh lower = person facing their right
  const facingLeft  = rSh.y > lSh.y + 5;  // right sh lower = person facing their left

  // Map normSpan to viewing angle
  // normSpan ~1.0 = front or back
  // normSpan ~0.0 = pure side
  let angle;
  if(normSpan > 0.75) {
    // Frontal or back - check nose visibility for front vs back
    const nose = gkp(kps, KP.NOSE, cw, ch);
    const backScore = nose ? 0 : 1;
    angle = backScore > 0.5 ? 180 : 0;
  } else if(normSpan < 0.25) {
    angle = facingLeft ? 90 : 270;
  } else {
    // Interpolate
    if(facingLeft)  angle = lrp(0, 90,  (1-normSpan)/0.75);
    else            angle = lrp(0, 270, (1-normSpan)/0.75);
    if(!facingLeft && !facingRight) angle = lrp(0, 45, (1-normSpan)/0.75);
  }

  // Build blend weights: smooth transition between views
  // Use circular distance to each canonical angle
  const canonicals = {front:0, side_l:90, back:180, side_r:270};
  const weights = {};
  let wSum = 0;
  Object.entries(canonicals).forEach(([name, ca]) => {
    let d = Math.abs(angle - ca);
    if(d > 180) d = 360 - d;
    // Gaussian-ish falloff: full weight at 0°, 0 at 90°+
    const w = Math.max(0, 1 - d/90);
    weights[name] = w * w; // square for sharper transitions
    wSum += weights[name];
  });
  if(wSum > 0) Object.keys(weights).forEach(k => weights[k] /= wSum);

  // Labels
  const labels = ['FRONT','FRONT-L','SIDE-L','BACK-L','BACK','BACK-R','SIDE-R','FRONT-R'];
  const labelIdx = Math.round(angle/45) % 8;
  const label = labels[labelIdx] || 'FRONT';

  return { angle: Math.round(angle), label, blend: weights };
}

// ═══════════════════════════════════════════════════════════════════
//  SKELETON RENDERER — Multi-view blended image overlay
// ═══════════════════════════════════════════════════════════════════

// Joint fractions within each full-view image
// [shoulderY, hipY, kneeY, ankleY, elbowY, wristY] all as fraction of image height
const VIEW_FRACS = {
  front:  { shY:0.206, hiY:0.499, knY:0.694, anY:0.889, elY:0.401, wrY:0.596,
             lShX:0.059, rShX:0.953, lHiX:0.153, rHiX:0.812,
             lElX:0.141, rElX:0.859, lWrX:0.141, rWrX:0.824,
             lKnX:0.153, rKnX:0.812, lAnX:0.200, rAnX:0.800 },
  side_l: { shY:0.209, hiY:0.501, knY:0.696, anY:0.892, elY:0.404, wrY:0.599,
             shX:0.693, hiX:0.467, knX:0.600, anX:0.707, elX:0.733, wrX:0.667 },
  back:   { shY:0.203, hiY:0.499, knY:0.696, anY:0.894,
             lShX:0.170, rShX:0.634, lHiX:0.214, rHiX:0.821,
             lKnX:0.214, rKnX:0.562, lAnX:0.220, rAnX:0.780 },
  side_r: { shY:0.201, hiY:0.499, knY:0.696, anY:0.894, elY:0.398, wrY:0.596,
             shX:0.710, hiX:0.568, knX:0.703, anX:0.710, elX:0.613, wrX:0.645 },
};

// Draw a single view's full skeleton image scaled to fit the detected body
function drawViewSkeleton(viewName, kps, cw, ch, alpha) {
  if(alpha < 0.02) return;
  const img = VIMGS[viewName];
  if(!img || !img.complete || img.naturalWidth===0) return;
  const f = VIEW_FRACS[viewName];
  if(!f) return;

  const g = i => gkp(kps,i,cw,ch);
  const lSh=g(KP.LSH), rSh=g(KP.RSH), lHi=g(KP.LHI), rHi=g(KP.RHI);
  const nose=g(KP.NOSE);

  // Need at minimum shoulders to place the image
  if(!lSh && !rSh) return;

  const iw = img.naturalWidth, ih = img.naturalHeight;

  // ── Compute body bounding box from detected keypoints ──
  // We'll fit the skeleton image so detected shoulder/hip points align with image fractions

  // For front/back views: use both shoulders
  // For side views: use the single visible shoulder
  let topLeft, bodyWidthPx, bodyHeightPx, rotation=0;

  if(viewName==='front' || viewName==='back') {
    if(!lSh || !rSh) return;
    const shMid = mid(lSh, rSh);
    const hiMid = (lHi && rHi) ? mid(lHi, rHi) : {x:shMid.x, y:shMid.y + dst(lSh,rSh)*1.45};
    
    // Shoulder span in canvas pixels
    const shSpanCanvas = dst(lSh, rSh);
    // In image, shoulder span = (rShX - lShX) * iw  fraction
    const shSpanImage  = (f.rShX - f.lShX) * iw;
    // Scale: canvas shoulder span / image shoulder span
    const scale = shSpanCanvas / shSpanImage;
    const drawW = iw * scale;
    const drawH = ih * scale;

    // Align: left shoulder in image at f.lShX, in canvas at lSh
    // Image x-origin:
    const imgOriginX = lSh.x - f.lShX * drawW;
    // Align: shoulder y in image at f.shY, in canvas at shMid.y
    const imgOriginY = shMid.y - f.shY * drawH;

    // Slight rotation from shoulder tilt
    const tilt = ang(lSh, rSh);
    
    ctx.save();
    ctx.globalAlpha = alpha * overlayAlpha;
    ctx.filter = 'drop-shadow(0 0 8px rgba(0,200,255,0.7)) brightness(1.1)';
    ctx.translate(shMid.x, shMid.y);
    ctx.rotate(tilt);
    ctx.drawImage(img, imgOriginX-shMid.x, imgOriginY-shMid.y, drawW, drawH);
    ctx.restore();

  } else {
    // Side views: use one shoulder
    const sh = (viewName==='side_l') ? (lSh||rSh) : (rSh||lSh);
    const hi = (viewName==='side_l') ? (lHi||rHi) : (rHi||lHi);
    if(!sh) return;
    const hiPt = hi || {x:sh.x, y:sh.y + (cw*0.22)};

    const torsoCanvas = dst(sh, hiPt);
    const torsoImageFrac = (f.hiY - f.shY);
    const scale = torsoCanvas / (torsoImageFrac * ih);
    const drawW = iw * scale;
    const drawH = ih * scale;

    const imgOriginX = sh.x - f.shX * drawW;
    const imgOriginY = sh.y - f.shY * drawH;

    ctx.save();
    ctx.globalAlpha = alpha * overlayAlpha;
    ctx.filter = 'drop-shadow(0 0 8px rgba(0,200,255,0.7)) brightness(1.1)';
    ctx.drawImage(img, imgOriginX, imgOriginY, drawW, drawH);
    ctx.restore();
  }
}

// ── Also draw the segmented detail bones over the whole-body image ──
function drawSegDetail(kps, cw, ch, alpha) {
  if(alpha < 0.05) return;
  const g = i => gkp(kps,i,cw,ch);
  const lSh=g(KP.LSH),rSh=g(KP.RSH),lEl=g(KP.LEL),rEl=g(KP.REL);
  const lWr=g(KP.LWR),rWr=g(KP.RWR),lHi=g(KP.LHI),rHi=g(KP.RHI);
  const lKn=g(KP.LKN),rKn=g(KP.RKN),lAn=g(KP.LAN),rAn=g(KP.RAN);
  const nose=g(KP.NOSE);

  function drawSeg(imgName, proxPt, distPt, proxFrac, distFrac, wMult, a) {
    if(!proxPt||!distPt) return;
    const img=SIMGS[imgName];
    if(!img||!img.complete||img.naturalWidth===0) return;
    const d=dst(proxPt,distPt);
    if(d<4) return;
    const span=distFrac-proxFrac;
    if(span<=0) return;
    const drawH=d/span;
    const drawW=(img.naturalWidth/img.naturalHeight)*drawH*wMult;
    const rotation=ang(proxPt,distPt)-Math.PI/2;
    ctx.save();
    ctx.globalAlpha=a*overlayAlpha;
    ctx.filter='drop-shadow(0 0 5px rgba(0,200,255,0.6)) brightness(1.08) saturate(0.3)';
    ctx.translate(proxPt.x,proxPt.y);
    ctx.rotate(rotation+Math.PI/2);
    ctx.drawImage(img,-drawW/2,-proxFrac*drawH,drawW,drawH);
    ctx.restore();
  }

  const a = alpha * 0.6;
  drawSeg('l_upper_arm',lSh,lEl,0.079,0.868,1.0,a);
  drawSeg('r_upper_arm',rSh,rEl,0.079,0.868,1.0,a);
  drawSeg('l_forearm',lEl,lWr,0.029,0.853,0.95,a);
  drawSeg('r_forearm',rEl,rWr,0.029,0.853,0.95,a);
  drawSeg('l_thigh',lHi,lKn,0.043,0.872,1.0,a);
  drawSeg('r_thigh',rHi,rKn,0.043,0.872,1.0,a);
  drawSeg('l_shin',lKn,lAn,0.0,0.902,0.95,a);
  drawSeg('r_shin',rKn,rAn,0.0,0.902,0.95,a);
}

function drawSkeleton(kps, cw, ch) {
  const viewInfo = detectViewAngle(kps, cw, ch);
  const b = viewInfo.blend;

  // Update angle HUD
  const needle = document.getElementById('angle-needle');
  const vLabel = document.getElementById('view-label');
  const aVal   = document.getElementById('angle-val');
  if(needle) needle.style.transform = `rotate(${viewInfo.angle}deg)`;
  if(vLabel) vLabel.textContent = viewInfo.label;
  if(aVal)   aVal.textContent   = viewInfo.angle + '°';
  document.getElementById('h-view').textContent = viewInfo.label;

  // Draw blended views (back-to-front for proper transparency)
  const order = ['back','side_l','side_r','front'];
  order.forEach(v => {
    if(b[v] > 0.02) drawViewSkeleton(v, kps, cw, ch, b[v]);
  });

  // Overlay detail segments at full blend weight
  const maxBlend = Math.max(...Object.values(b));
  drawSegDetail(kps, cw, ch, maxBlend * 0.5);
}

// ═══════════════════════════════════════════════════════════════════
//  MUSCULAR SYSTEM (procedural)
// ═══════════════════════════════════════════════════════════════════
function drawMuscle(a,b,col,w,blur) {
  if(!a||!b) return;
  const d=dst(a,b), cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(ang(a,b));
  ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.fillStyle=col; ctx.globalAlpha=overlayAlpha*0.48;
  ctx.beginPath();
  ctx.moveTo(-d/2,0);
  ctx.bezierCurveTo(-d/4,-w,d/4,-w,d/2,0);
  ctx.bezierCurveTo(d/4,w,-d/4,w,-d/2,0);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha=overlayAlpha*0.38; ctx.strokeStyle=col; ctx.lineWidth=0.7;
  for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(-d*0.65,i/2.5*w*0.6); ctx.lineTo(d*0.65,i/2.5*w*0.6); ctx.stroke(); }
  ctx.restore();
}

function drawMuscular(kps,cw,ch) {
  const g=i=>gkp(kps,i,cw,ch);
  const sc=cw/640, C='#ff5050', CM='#ff8844', CD='#cc3030';
  const mW=Math.max(11,20*sc);
  const nose=g(KP.NOSE),lSh=g(KP.LSH),rSh=g(KP.RSH);
  const lEl=g(KP.LEL),rEl=g(KP.REL),lWr=g(KP.LWR),rWr=g(KP.RWR);
  const lHi=g(KP.LHI),rHi=g(KP.RHI),lKn=g(KP.LKN),rKn=g(KP.RKN);
  const lAn=g(KP.LAN),rAn=g(KP.RAN);
  if(nose&&lSh) drawMuscle(nose,lSh,CM,mW*0.32,7);
  if(nose&&rSh) drawMuscle(nose,rSh,CM,mW*0.32,7);
  if(lSh&&lEl) drawMuscle(lSh,lEl,CM,mW*0.85,13);
  if(rSh&&rEl) drawMuscle(rSh,rEl,CM,mW*0.85,13);
  if(lEl&&lWr) drawMuscle(lEl,lWr,C,mW*0.7,10);
  if(rEl&&rWr) drawMuscle(rEl,rWr,C,mW*0.7,10);
  if(lSh&&rSh&&lHi) {
    const cc=mid(lSh,rSh); cc.y+=dst(lSh,rSh)*0.16;
    const cb={x:cc.x,y:cc.y+dst(lSh,rSh)*0.4};
    drawMuscle(lSh,{x:cc.x-3*sc,y:cb.y},C,mW,14);
    drawMuscle(rSh,{x:cc.x+3*sc,y:cb.y},C,mW,14);
  }
  if(lSh&&rSh&&lHi&&rHi) {
    const tA={x:mid(lSh,rSh).x,y:mid(lSh,rSh).y+dst(lSh,rSh)*0.36};
    const bA=mid(lHi,rHi); const aw=dst(lHi,rHi)*0.15;
    for(let i=0;i<4;i++) {
      const ay=lrp(tA.y,bA.y,i/4), ay2=lrp(tA.y,bA.y,(i+0.78)/4);
      ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=8;
      ctx.fillStyle=C; ctx.globalAlpha=overlayAlpha*0.28;
      ctx.beginPath(); ctx.ellipse(tA.x-aw,(ay+ay2)/2,aw*0.6,(ay2-ay)*0.42,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(tA.x+aw,(ay+ay2)/2,aw*0.6,(ay2-ay)*0.42,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  if(lSh&&rSh) {
    const tr={x:mid(lSh,rSh).x,y:lSh.y-dst(lSh,rSh)*0.2};
    ctx.save(); ctx.shadowColor=CM; ctx.shadowBlur=12;
    ctx.fillStyle=CM; ctx.globalAlpha=overlayAlpha*0.35;
    ctx.beginPath(); ctx.moveTo(tr.x,tr.y);
    ctx.lineTo(lSh.x-3*sc,lSh.y); ctx.lineTo(lSh.x,lSh.y+dst(lSh,rSh)*0.2);
    ctx.lineTo(tr.x,tr.y+dst(lSh,rSh)*0.3); ctx.lineTo(rSh.x,rSh.y+dst(lSh,rSh)*0.2);
    ctx.lineTo(rSh.x+3*sc,rSh.y); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  if(lHi&&rHi&&lKn) {
    const pc=mid(lHi,rHi);
    drawMuscle(lHi,{x:pc.x-6*sc,y:pc.y+dst(lHi,rHi)*0.36},CM,mW*1.1,14);
    drawMuscle(rHi,{x:pc.x+6*sc,y:pc.y+dst(lHi,rHi)*0.36},CM,mW*1.1,14);
  }
  if(lHi&&lKn) drawMuscle(lHi,lKn,C,mW*1.05,14);
  if(rHi&&rKn) drawMuscle(rHi,rKn,C,mW*1.05,14);
  if(lHi&&lKn) drawMuscle({x:lHi.x+4*sc,y:lHi.y+2*sc},{x:lKn.x+3*sc,y:lKn.y-2*sc},CD,mW*0.6,8);
  if(rHi&&rKn) drawMuscle({x:rHi.x-4*sc,y:rHi.y+2*sc},{x:rKn.x-3*sc,y:rKn.y-2*sc},CD,mW*0.6,8);
  if(lKn&&lAn) drawMuscle(lKn,lAn,C,mW*0.78,10);
  if(rKn&&rAn) drawMuscle(rKn,rAn,C,mW*0.78,10);
}

// ═══════════════════════════════════════════════════════════════════
//  CIRCULATORY SYSTEM
// ═══════════════════════════════════════════════════════════════════
function drawVessel(pts,col,w,blur) {
  if(pts.length<2) return;
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=overlayAlpha;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++) {
    const cx=(pts[i].x+pts[i+1].x)/2, cy=(pts[i].y+pts[i+1].y)/2;
    ctx.quadraticCurveTo(pts[i].x,pts[i].y,cx,cy);
  }
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  ctx.stroke(); ctx.restore();
}
function drawCirculatory(kps,cw,ch) {
  heartPhase+=0.055;
  const beat=Math.pow(Math.max(0,Math.sin(heartPhase*1.75)),3)*0.38+0.62;
  const g=i=>gkp(kps,i,cw,ch);
  const sc=cw/640, ART='#ff2244', VEN='#3366ff', off=4*sc;
  const lSh=g(KP.LSH),rSh=g(KP.RSH),nose=g(KP.NOSE);
  const lEl=g(KP.LEL),rEl=g(KP.REL),lWr=g(KP.LWR),rWr=g(KP.RWR);
  const lHi=g(KP.LHI),rHi=g(KP.RHI),lKn=g(KP.LKN),rKn=g(KP.RKN);
  const lAn=g(KP.LAN),rAn=g(KP.RAN);
  const vW=Math.max(2,3*sc);
  if(lSh&&rSh) {
    const hc={x:lrp(lSh.x,rSh.x,0.54),y:lSh.y+dst(lSh,rSh)*0.28};
    const hr=dst(lSh,rSh)*0.14*beat;
    ctx.save(); ctx.shadowColor=ART; ctx.shadowBlur=18*beat;
    ctx.fillStyle=ART; ctx.globalAlpha=overlayAlpha*0.52*beat;
    ctx.beginPath();
    ctx.moveTo(hc.x,hc.y+hr*0.75);
    ctx.bezierCurveTo(hc.x-hr*1.5,hc.y-hr,hc.x-hr*2,hc.y-hr*0.4,hc.x-hr,hc.y-hr*1.4);
    ctx.bezierCurveTo(hc.x-hr*0.3,hc.y-hr*1.9,hc.x,hc.y-hr*1.4,hc.x,hc.y-hr*0.7);
    ctx.bezierCurveTo(hc.x,hc.y-hr*1.4,hc.x+hr*0.3,hc.y-hr*1.9,hc.x+hr,hc.y-hr*1.4);
    ctx.bezierCurveTo(hc.x+hr*2,hc.y-hr*0.4,hc.x+hr*1.5,hc.y-hr,hc.x,hc.y+hr*0.75);
    ctx.closePath(); ctx.fill(); ctx.restore();
    if(nose) drawVessel([hc,{x:(hc.x+nose.x)/2,y:(hc.y+nose.y)/2},nose],ART,vW*1.3,11);
    if(lSh) drawVessel([hc,mid(hc,lSh),lSh],VEN,vW,7);
    if(rSh) drawVessel([hc,mid(hc,rSh),rSh],VEN,vW,7);
  }
  if(lSh&&lEl) drawVessel([lSh,lEl],ART,vW*0.95,8);
  if(lEl&&lWr) drawVessel([lEl,lWr],ART,vW*0.8,7);
  if(rSh&&rEl) drawVessel([rSh,rEl],ART,vW*0.95,8);
  if(rEl&&rWr) drawVessel([rEl,rWr],ART,vW*0.8,7);
  if(lSh&&rSh&&lHi&&rHi) {
    const ct=mid(lSh,rSh),pl=mid(lHi,rHi);
    drawVessel([ct,{x:ct.x,y:(ct.y+pl.y)/2},pl],ART,vW*1.2,10);
  }
  if(lHi&&lKn) drawVessel([lHi,mid(lHi,lKn),lKn],ART,vW,8);
  if(rHi&&rKn) drawVessel([rHi,mid(rHi,rKn),rKn],ART,vW,8);
  if(lKn&&lAn) drawVessel([lKn,mid(lKn,lAn),lAn],ART,vW*0.8,7);
  if(rKn&&rAn) drawVessel([rKn,mid(rKn,rAn),rAn],ART,vW*0.8,7);
  [lSh,rSh,lHi,rHi,lKn,rKn].forEach((n,i) => {
    if(!n) return;
    const p=(Math.sin(heartPhase*1.75+i*1.2)+1)/2;
    ctx.save(); ctx.shadowColor=ART; ctx.shadowBlur=10*p;
    ctx.fillStyle=ART; ctx.globalAlpha=overlayAlpha*0.42*p;
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.max(3,5*sc)*(0.7+0.3*p),0,Math.PI*2);
    ctx.fill(); ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════════
//  NERVOUS SYSTEM
// ═══════════════════════════════════════════════════════════════════
function drawNerve(a,b,col,w,blur) {
  if(!a||!b) return;
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.globalAlpha=overlayAlpha;
  ctx.setLineDash([6,4]); ctx.lineDashOffset=-(Date.now()/55)%10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(a.x,a.y);
  const cp={x:lrp(a.x,b.x,0.5)+(b.y-a.y)*0.07,y:lrp(a.y,b.y,0.5)-(b.x-a.x)*0.07};
  ctx.quadraticCurveTo(cp.x,cp.y,b.x,b.y);
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}
function drawNervous(kps,cw,ch) {
  const g=i=>gkp(kps,i,cw,ch);
  const sc=cw/640, C='#ffe855', CB='#ffaa00';
  const nW=Math.max(1.5,2.3*sc), t=Date.now();
  const nose=g(KP.NOSE),lSh=g(KP.LSH),rSh=g(KP.RSH);
  const lEl=g(KP.LEL),rEl=g(KP.REL),lWr=g(KP.LWR),rWr=g(KP.RWR);
  const lHi=g(KP.LHI),rHi=g(KP.RHI),lKn=g(KP.LKN),rKn=g(KP.RKN);
  const lAn=g(KP.LAN),rAn=g(KP.RAN);
  if(nose&&lSh&&rSh) {
    const br=dst(lSh,rSh)*0.23;
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=20;
    ctx.strokeStyle=C; ctx.lineWidth=nW*1.2; ctx.globalAlpha=overlayAlpha;
    ctx.beginPath(); ctx.arc(nose.x-br*0.3,nose.y-br*0.76,br*0.6,Math.PI*0.8,Math.PI*2.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(nose.x+br*0.3,nose.y-br*0.76,br*0.6,Math.PI*0.8,Math.PI*2.2); ctx.stroke();
    ctx.lineWidth=nW*0.4; ctx.globalAlpha=overlayAlpha*0.42;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(nose.x-br*0.26,nose.y-br*0.76,br*0.26+i*5*sc,Math.PI,Math.PI*2); ctx.stroke(); }
    ctx.restore();
    const neck={x:mid(lSh,rSh).x,y:mid(lSh,rSh).y-dst(lSh,rSh)*0.26};
    drawNerve(nose,neck,C,nW*1.2,13);
  }
  if(lSh&&rSh&&lHi&&rHi) {
    const ts=mid(lSh,rSh),bs=mid(lHi,rHi);
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=10;
    ctx.strokeStyle=C; ctx.lineWidth=nW*1.4; ctx.globalAlpha=overlayAlpha;
    ctx.setLineDash([8,4]); ctx.lineDashOffset=-(t/48)%12;
    ctx.beginPath(); ctx.moveTo(ts.x,ts.y); ctx.lineTo(bs.x,bs.y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    const side=dst(lSh,rSh)*0.25;
    for(let i=0;i<6;i++) {
      const r=(i+0.5)/6;
      const rx=lrp(ts.x,bs.x,r),ry=lrp(ts.y,bs.y,r);
      drawNerve({x:rx,y:ry},{x:rx-side,y:ry},C,nW*0.72,6);
      drawNerve({x:rx,y:ry},{x:rx+side,y:ry},C,nW*0.72,6);
    }
  }
  drawNerve(lSh,lEl,C,nW*1.0,8); drawNerve(rSh,rEl,C,nW*1.0,8);
  drawNerve(lEl,lWr,C,nW,7); drawNerve(rEl,rWr,C,nW,7);
  if(lWr) for(let a=-0.4;a<=0.4;a+=0.2) drawNerve(lWr,{x:lWr.x+Math.cos(a+Math.PI*.5)*20*sc,y:lWr.y+Math.sin(a+Math.PI*.5)*20*sc},C,nW*0.5,5);
  if(rWr) for(let a=-0.4;a<=0.4;a+=0.2) drawNerve(rWr,{x:rWr.x+Math.cos(a-Math.PI*.5)*20*sc,y:rWr.y+Math.sin(a-Math.PI*.5)*20*sc},C,nW*0.5,5);
  drawNerve(lHi,lKn,CB,nW*1.1,10); drawNerve(rHi,rKn,CB,nW*1.1,10);
  drawNerve(lKn,lAn,C,nW,7); drawNerve(rKn,rAn,C,nW,7);
  [nose,lSh,rSh,lEl,rEl,lHi,rHi,lKn,rKn].forEach((n,i) => {
    if(!n) return;
    const p=(Math.sin(t/280+i*1.25)+1)/2;
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=13*p;
    ctx.fillStyle=C; ctx.globalAlpha=overlayAlpha*(0.42+0.48*p);
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.max(2.5,4.2*sc)*(0.7+0.3*p),0,Math.PI*2);
    ctx.fill(); ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function renderPoses(poses) {
  const cw=canvas.width, ch=canvas.height;
  ctx.clearRect(0,0,cw,ch);
  if(!poses||poses.length===0) {
    document.getElementById('np').classList.remove('h');
    document.getElementById('h-bod').textContent='0';
    document.getElementById('h-pose').textContent='--';
    document.getElementById('h-conf').textContent='--';
    document.getElementById('cf').style.height='0%';
    document.getElementById('cpct').textContent='0%';
    document.getElementById('sdot').className='dot yellow';
    document.getElementById('stxt').textContent='SCANNING';
    document.getElementById('angle-needle').style.transform='rotate(0deg)';
    document.getElementById('view-label').textContent='--';
    document.getElementById('angle-val').textContent='--';
    return;
  }
  document.getElementById('np').classList.add('h');
  document.getElementById('h-bod').textContent=poses.length;
  document.getElementById('sdot').className='dot';
  document.getElementById('stxt').textContent='TRACKING';
  document.getElementById('h-pose').textContent='LIVE';
  let maxConf=0;
  poses.forEach(pose => {
    const kps=pose.keypoints;
    const valid=kps.filter(k=>k.score>0.2);
    const avg=valid.length>0?valid.reduce((s,k)=>s+k.score,0)/valid.length:0;
    maxConf=Math.max(maxConf,avg);
    switch(activeSystem) {
      case 'skeleton':    drawSkeleton(kps,cw,ch);    break;
      case 'muscular':    drawMuscular(kps,cw,ch);    break;
      case 'circulatory': drawCirculatory(kps,cw,ch); break;
      case 'nervous':     drawNervous(kps,cw,ch);     break;
    }
  });
  const pct=Math.round(maxConf*100);
  document.getElementById('h-conf').textContent=pct+'%';
  document.getElementById('cf').style.height=pct+'%';
  document.getElementById('cpct').textContent=pct+'%';
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
function setStatus(t,p) {
  document.getElementById('lst').textContent=t;
  document.getElementById('lb').style.width=p+'%';
}

async function init() {
  setStatus('Requesting camera...',8);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;
    setStatus('Camera connected. Loading anatomy images...',20);
    await new Promise(r=>video.onloadedmetadata=r);
    video.play();
    await preloadAll();
    setStatus(`Loaded ${_loaded} anatomy assets. Loading AI model...`,45);
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
        enableSmoothing:true,enableTracking:true,
        trackerType:poseDetection.TrackerType.BoundingBox}
    );
    setStatus('Warming up neural network...',80);
    const tc=document.createElement('canvas'); tc.width=192; tc.height=192;
    await detector.estimatePoses(tc);
    setStatus('System online.',100);
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loading').classList.add('h');
    const resizeCanvas=()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; };
    resizeCanvas(); window.addEventListener('resize',resizeCanvas);
    document.getElementById('h-res').textContent=video.videoWidth+'x'+video.videoHeight;
    let fC=0, fT=performance.now();
    async function loop() {
      if(video.readyState>=2&&detector) {
        const raw=await detector.estimatePoses(video,{maxPoses:3,flipHorizontal:false});
        const poses=smoothKps(raw) || raw;
        renderPoses(poses);
        fC++;
        const now=performance.now();
        if(now-fT>1000) {
          document.getElementById('h-fps').textContent=Math.round(fC*1000/(now-fT));
          fC=0; fT=now;
        }
      }
      requestAnimationFrame(loop);
    }
    loop();
  } catch(err) {
    setStatus('Error: '+err.message,0);
    document.getElementById('sdot').className='dot red';
    document.getElementById('stxt').textContent='ERROR';
    document.getElementById('lb').style.background='#f44';
    console.error(err);
  }
}

// Controls
document.querySelectorAll('.sb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSystem=btn.dataset.s;
    document.getElementById('h-sys').textContent=activeSystem.toUpperCase();
  });
});
document.getElementById('aslider').addEventListener('input',e=>{
  overlayAlpha=parseInt(e.target.value)/100;
  document.getElementById('aval').textContent=e.target.value+'%';
});

init();
</script>
