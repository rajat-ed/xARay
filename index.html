<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>X·RAY VISION — Anatomical AR</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#020408;--glow:#00dcff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--glow);font-family:'Orbitron',sans-serif;overflow:hidden;height:100vh;width:100vw;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,220,255,.012) 2px,rgba(0,220,255,.012) 4px);pointer-events:none;z-index:100;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:99;}
#app{position:relative;width:100vw;height:100vh;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;filter:saturate(.2) brightness(.5) contrast(1.2);transform:scaleX(-1);}
#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:linear-gradient(to bottom,rgba(2,4,8,.95),transparent);}
#logo{font-size:clamp(13px,2.4vw,20px);font-weight:900;letter-spacing:.25em;color:var(--glow);text-shadow:0 0 18px var(--glow),0 0 36px var(--glow);}
#logo span{color:#fff;font-weight:400;}
#sbadge{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--glow);display:flex;align-items:center;gap:7px;opacity:.7;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--glow);box-shadow:0 0 7px var(--glow);animation:pd 1.5s ease-in-out infinite;}
.dot.red{background:#f44;box-shadow:0 0 7px #f44;}
.dot.yellow{background:#fc0;box-shadow:0 0 7px #fc0;}
@keyframes pd{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.75);}}
#controls{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 18px 20px;background:linear-gradient(to top,rgba(2,4,8,.97),transparent);}
#slabel{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.3em;color:rgba(0,220,255,.4);}
#sbtns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
.sb{font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.5vw,10px);font-weight:700;letter-spacing:.12em;padding:8px 14px;border:1px solid rgba(0,220,255,.18);background:rgba(0,0,0,.5);color:rgba(255,255,255,.35);cursor:pointer;border-radius:2px;transition:all .18s;text-transform:uppercase;min-width:100px;text-align:center;}
.sb .si{display:block;font-size:14px;margin-bottom:2px;}
.sb[data-s="skeleton"].active{border-color:rgba(200,230,255,.65);color:#e8f4ff;box-shadow:0 0 12px rgba(200,230,255,.18);}
.sb[data-s="muscular"].active{border-color:rgba(255,80,80,.6);color:#ff8888;box-shadow:0 0 12px rgba(255,80,80,.18);}
.sb[data-s="circulatory"].active{border-color:rgba(255,34,68,.7);color:#ff6080;box-shadow:0 0 12px rgba(255,34,68,.22);}
.sb[data-s="nervous"].active{border-color:rgba(255,228,74,.6);color:#ffe44a;box-shadow:0 0 12px rgba(255,228,74,.18);}
.sb:hover{opacity:.85;filter:brightness(1.15);}
#arow{display:flex;align-items:center;gap:9px;}
#alabel{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,220,255,.38);letter-spacing:.08em;}
#aslider{-webkit-appearance:none;appearance:none;width:90px;height:2px;background:rgba(0,220,255,.18);border-radius:1px;outline:none;cursor:pointer;}
#aslider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--glow);box-shadow:0 0 5px var(--glow);cursor:pointer;}
.hc{position:fixed;z-index:200;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,220,255,.38);line-height:1.85;letter-spacing:.04em;}
#htl{top:58px;left:14px;}#htr{top:58px;right:14px;text-align:right;}
.hv{color:rgba(0,220,255,.8);}
.bk{position:fixed;width:32px;height:32px;z-index:201;opacity:.3;}
#btl{top:7px;left:7px;border-top:1px solid var(--glow);border-left:1px solid var(--glow);}
#btr{top:7px;right:7px;border-top:1px solid var(--glow);border-right:1px solid var(--glow);}
#bbl{bottom:7px;left:7px;border-bottom:1px solid var(--glow);border-left:1px solid var(--glow);}
#bbr{bottom:7px;right:7px;border-bottom:1px solid var(--glow);border-right:1px solid var(--glow);}
#cw{position:fixed;top:50%;right:12px;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:4px;align-items:center;}
#cm{width:3px;height:65px;background:rgba(0,220,255,.08);border-radius:2px;position:relative;overflow:hidden;}
#cf{position:absolute;bottom:0;left:0;right:0;background:var(--glow);box-shadow:0 0 4px var(--glow);transition:height .25s;border-radius:2px;}
.clab{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,220,255,.35);}
#np{position:fixed;bottom:108px;left:50%;transform:translateX(-50%);z-index:200;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.12em;color:rgba(0,220,255,.3);transition:opacity .4s;pointer-events:none;white-space:nowrap;}
#np.h{opacity:0;}
#loading{position:fixed;inset:0;background:#020408;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .8s ease;}
#loading.h{opacity:0;pointer-events:none;}
#ltitle{font-size:clamp(20px,5.5vw,48px);font-weight:900;letter-spacing:.3em;color:var(--glow);text-shadow:0 0 28px var(--glow),0 0 55px rgba(0,220,255,.35);animation:flk 3s ease-in-out infinite;}
@keyframes flk{0%,94%,100%{opacity:1;}95.5%{opacity:.6;}97.5%{opacity:.82;}}
#lsub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(0,220,255,.5);}
#lbw{width:min(300px,78vw);height:2px;background:rgba(0,220,255,.1);border-radius:1px;overflow:hidden;}
#lb{height:100%;width:0%;background:linear-gradient(to right,transparent,var(--glow),#fff);box-shadow:0 0 9px var(--glow);transition:width .3s ease;}
#lst{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.12em;color:rgba(0,220,255,.38);min-height:13px;}
</style>
</head>
<body>

<div id="loading">
  <div id="ltitle">X·RAY</div>
  <div id="lsub">ANATOMICAL AUGMENTED REALITY</div>
  <div id="lbw"><div id="lb"></div></div>
  <div id="lst">Initializing...</div>
</div>

<div class="bk" id="btl"></div><div class="bk" id="btr"></div>
<div class="bk" id="bbl"></div><div class="bk" id="bbr"></div>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="topbar">
  <div id="logo">X·<span>RAY</span> VISION</div>
  <div id="sbadge"><div class="dot" id="sdot"></div><span id="stxt">INITIALIZING</span></div>
</div>

<div class="hc" id="htl">
  <div>SYS &nbsp;<span class="hv" id="h-sys">SKELETON</span></div>
  <div>FPS &nbsp;<span class="hv" id="h-fps">--</span></div>
  <div>BODIES <span class="hv" id="h-bod">0</span></div>
</div>
<div class="hc" id="htr">
  <div>RES <span class="hv" id="h-res">--</span></div>
  <div>CONF <span class="hv" id="h-conf">--</span></div>
  <div>POSE <span class="hv" id="h-pose">--</span></div>
</div>

<div id="cw">
  <span class="clab">CONF</span>
  <div id="cm"><div id="cf" style="height:0%"></div></div>
  <span class="clab" id="cpct">0%</span>
</div>

<div id="np">[ STAND IN FRONT OF CAMERA ]</div>

<div id="controls">
  <div id="slabel">◈ ANATOMICAL SYSTEM ◈</div>
  <div id="sbtns">
    <button class="sb active" data-s="skeleton"><span class="si">🦴</span>SKELETON</button>
    <button class="sb" data-s="muscular"><span class="si">💪</span>MUSCULAR</button>
    <button class="sb" data-s="circulatory"><span class="si">🫀</span>CIRCULATORY</button>
    <button class="sb" data-s="nervous"><span class="si">⚡</span>NERVOUS</button>
  </div>
  <div id="arow">
    <span id="alabel">OVERLAY α</span>
    <input type="range" id="aslider" min="15" max="100" value="82">
    <span class="clab" id="aval">82%</span>
  </div>
</div>

// Preload images
const IMGS = {};
let loadedCount = 0;
const segNames = Object.keys(RAW_SEGS);
let imagesReady = false;

function preloadImages() {
  return new Promise(resolve => {
    segNames.forEach(name => {
      const img = new Image();
      img.onload = img.onerror = () => {
        loadedCount++;
        if (loadedCount >= segNames.length) { imagesReady = true; resolve(); }
      };
      img.src = RAW_SEGS[name].src;
      IMGS[name] = img;
    });
  });
}

// ══════════════════════════════════════════════════════════════════
//  KEYPOINTS
// ══════════════════════════════════════════════════════════════════
const KP = {
  NOSE:0, L_EYE:1, R_EYE:2, L_EAR:3, R_EAR:4,
  LSH:5, RSH:6, LEL:7, REL:8, LWR:9, RWR:10,
  LHI:11, RHI:12, LKN:13, RKN:14, LAN:15, RAN:16
};

const video  = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
let detector = null;
let activeSystem = 'skeleton';
let overlayAlpha = 0.82;
let frameCount = 0, lastFpsTime = performance.now(), fps = 0;
let heartPhase = 0;

// ══════════════════════════════════════════════════════════════════
//  GEOMETRY UTILS
// ══════════════════════════════════════════════════════════════════
function gkp(kps, idx, cw, ch) {
  const k = kps[idx];
  if (!k || k.score < 0.18) return null;
  return { x: cw - (k.x / video.videoWidth) * cw, y: (k.y / video.videoHeight) * ch, s: k.score };
}
const mid   = (a,b) => ({x:(a.x+b.x)/2, y:(a.y+b.y)/2});
const dst   = (a,b) => Math.hypot(b.x-a.x,b.y-a.y);
const ang   = (a,b) => Math.atan2(b.y-a.y,b.x-a.x);
const lrp   = (a,b,t) => a+(b-a)*t;

// ══════════════════════════════════════════════════════════════════
//  CORE IMAGE SEGMENT RENDERER
//
//  Draws a bone image so that proximal joint lands at proxFrac down
//  the image and distal joint lands at distFrac.
//  The image is rotated to align with the limb direction.
// ══════════════════════════════════════════════════════════════════
function drawBoneImage(imgName, proxPt, distPt, proxFrac, distFrac, widthMult, alpha) {
  if (!proxPt || !distPt) return;
  const img = IMGS[imgName];
  if (!img || !img.complete || img.naturalWidth === 0) return;

  const d = dst(proxPt, distPt);
  if (d < 5) return;

  const spanFrac = distFrac - proxFrac;
  if (spanFrac <= 0) return;

  // Total rendered height so the bone span fills the inter-joint distance
  const drawH = d / spanFrac;
  const aspect = img.naturalWidth / img.naturalHeight;
  const drawW = aspect * drawH * widthMult;

  // Angle: from proxPt toward distPt, then offset -PI/2
  // because we draw the image downward (+y) which is bone direction
  const rotation = ang(proxPt, distPt) - Math.PI / 2;

  ctx.save();
  ctx.globalAlpha = alpha;
  // Glow tint for skeleton system
  if (activeSystem === 'skeleton') {
    ctx.filter = 'drop-shadow(0px 0px 6px rgba(180,215,255,0.8)) brightness(1.05)';
  }
  ctx.translate(proxPt.x, proxPt.y);
  ctx.rotate(rotation + Math.PI / 2);
  // After rotation: +y points along proxPt→distPt
  // Draw image: top at -proxFrac*drawH, center horizontally
  ctx.drawImage(img, -drawW / 2, -proxFrac * drawH, drawW, drawH);
  ctx.restore();
}

// Draw a bone image anchored at a single point (no distal joint)
// Used for skull, pelvis, hands, feet where we estimate size from context
function drawBoneImageAnchored(imgName, anchorPt, anchorFrac, refSize, widthMult, rotAngle, alpha) {
  if (!anchorPt) return;
  const img = IMGS[imgName];
  if (!img || !img.complete || img.naturalWidth === 0) return;

  const aspect = img.naturalWidth / img.naturalHeight;
  const drawH  = refSize;
  const drawW  = aspect * drawH * widthMult;

  ctx.save();
  ctx.globalAlpha = alpha;
  if (activeSystem === 'skeleton') {
    ctx.filter = 'drop-shadow(0px 0px 6px rgba(180,215,255,0.8)) brightness(1.05)';
  }
  ctx.translate(anchorPt.x, anchorPt.y);
  ctx.rotate(rotAngle);
  ctx.drawImage(img, -drawW / 2, -anchorFrac * drawH, drawW, drawH);
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
//  SKELETON SYSTEM — uses actual cropped bone images
// ══════════════════════════════════════════════════════════════════
function drawSkeleton(kps, cw, ch) {
  const g = i => gkp(kps, i, cw, ch);
  const a = overlayAlpha;

  const nose = g(KP.NOSE);
  const lSh  = g(KP.LSH),  rSh = g(KP.RSH);
  const lEl  = g(KP.LEL),  rEl = g(KP.REL);
  const lWr  = g(KP.LWR),  rWr = g(KP.RWR);
  const lHi  = g(KP.LHI),  rHi = g(KP.RHI);
  const lKn  = g(KP.LKN),  rKn = g(KP.RKN);
  const lAn  = g(KP.LAN),  rAn = g(KP.RAN);

  // ── TORSO (shoulders → hips) ──────────────────────────
  if (lSh && rSh && lHi && rHi) {
    const topM = mid(lSh, rSh);
    const botM = mid(lHi, rHi);
    // proxFrac=0.115 = shoulders line in torso image
    // distFrac=0.947 = hips line in torso image
    drawBoneImage('torso', topM, botM, 0.115, 0.947, 1.08, a);
  }

  // ── SKULL ─────────────────────────────────────────────
  if (nose && lSh && rSh) {
    // Estimate head size from shoulder width
    const shW = dst(lSh, rSh);
    const headH = shW * 0.85;
    // Skull base (chin) is at ~0.88 of skull image
    // anchor: nose is roughly at 0.68 of skull image vertically
    // Angle: keep upright (0)
    drawBoneImageAnchored('skull', nose, 0.68, headH, 1.0, 0, a);
  } else if (nose) {
    drawBoneImageAnchored('skull', nose, 0.68, 90, 1.0, 0, a);
  }

  // ── PELVIS ────────────────────────────────────────────
  if (lHi && rHi) {
    const pelM = mid(lHi, rHi);
    const hipW = dst(lHi, rHi);
    // Pelvis image: proxFrac at center horizontally
    // Draw anchored at hip mid, horizontal width matches hipW
    const pelH = hipW * 0.42;
    drawBoneImageAnchored('pelvis', pelM, 0.22, pelH * 2.4, 1.0, 0, a * 0.9);
  }

  // ── ARMS ──────────────────────────────────────────────
  // Left upper arm: shoulder(proxFrac=0.079) → elbow(distFrac=0.868)
  drawBoneImage('l_upper_arm', lSh, lEl, 0.079, 0.868, 1.0, a);
  // Right upper arm
  drawBoneImage('r_upper_arm', rSh, rEl, 0.079, 0.868, 1.0, a);
  // Left forearm: elbow(0.029) → wrist(0.853)
  drawBoneImage('l_forearm', lEl, lWr, 0.029, 0.853, 0.95, a);
  // Right forearm
  drawBoneImage('r_forearm', rEl, rWr, 0.029, 0.853, 0.95, a);

  // ── HANDS ─────────────────────────────────────────────
  if (lWr && lEl) {
    const handDir = ang(lEl, lWr);
    const handSize = dst(lEl, lWr) * 0.42;
    drawBoneImageAnchored('l_hand', lWr, 0.12, handSize, 1.1, handDir, a * 0.85);
  }
  if (rWr && rEl) {
    const handDir = ang(rEl, rWr);
    const handSize = dst(rEl, rWr) * 0.42;
    drawBoneImageAnchored('r_hand', rWr, 0.12, handSize, 1.1, handDir, a * 0.85);
  }

  // ── LEGS ──────────────────────────────────────────────
  // Left thigh: hip(0.043) → knee(0.872)
  drawBoneImage('l_thigh', lHi, lKn, 0.043, 0.872, 1.02, a);
  // Right thigh
  drawBoneImage('r_thigh', rHi, rKn, 0.043, 0.872, 1.02, a);
  // Left shin: knee(0.0) → ankle(0.902)
  drawBoneImage('l_shin', lKn, lAn, 0.0, 0.902, 0.95, a);
  // Right shin
  drawBoneImage('r_shin', rKn, rAn, 0.0, 0.902, 0.95, a);

  // ── FEET ──────────────────────────────────────────────
  if (lAn && lKn) {
    const fDir = ang(lKn, lAn);
    const fSize = dst(lKn, lAn) * 0.28;
    drawBoneImageAnchored('l_foot', lAn, 0.1, fSize, 1.2, fDir + Math.PI * 0.18, a * 0.8);
  }
  if (rAn && rKn) {
    const fDir = ang(rKn, rAn);
    const fSize = dst(rKn, rAn) * 0.28;
    drawBoneImageAnchored('r_foot', rAn, 0.1, fSize, 1.2, fDir + Math.PI * 0.18, a * 0.8);
  }
}

// ══════════════════════════════════════════════════════════════════
//  MUSCULAR SYSTEM (procedural — rich anatomical drawing)
// ══════════════════════════════════════════════════════════════════
function drawMuscle(a, b, col, w, blur) {
  if (!a || !b) return;
  const d = dst(a, b);
  const rotation = ang(a, b);
  const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(rotation);
  ctx.shadowColor = col; ctx.shadowBlur = blur;
  ctx.fillStyle = col; ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-d/2, 0);
  ctx.bezierCurveTo(-d/4, -w, d/4, -w, d/2, 0);
  ctx.bezierCurveTo(d/4, w, -d/4, w, -d/2, 0);
  ctx.closePath(); ctx.fill();
  // Fiber lines
  ctx.globalAlpha = 0.45; ctx.strokeStyle = col; ctx.lineWidth = 0.7;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(-d/2*0.7, i/2.5*w*0.65);
    ctx.lineTo(d/2*0.7, i/2.5*w*0.65);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMuscular(kps, cw, ch) {
  const g = i => gkp(kps, i, cw, ch);
  const sc = cw / 640;
  const C = '#ff5050', CM = '#ff8844', CD = '#cc3030';
  const mW = Math.max(12, 22 * sc);

  const nose=g(KP.NOSE), lSh=g(KP.LSH), rSh=g(KP.RSH);
  const lEl=g(KP.LEL), rEl=g(KP.REL), lWr=g(KP.LWR), rWr=g(KP.RWR);
  const lHi=g(KP.LHI), rHi=g(KP.RHI), lKn=g(KP.LKN), rKn=g(KP.RKN);
  const lAn=g(KP.LAN), rAn=g(KP.RAN);

  if (nose && lSh) drawMuscle(nose, lSh, CM, mW*0.35, 8);
  if (nose && rSh) drawMuscle(nose, rSh, CM, mW*0.35, 8);
  if (lSh && lEl) drawMuscle(lSh, lEl, CM, mW*0.88, 14);
  if (rSh && rEl) drawMuscle(rSh, rEl, CM, mW*0.88, 14);
  if (lEl && lWr) drawMuscle(lEl, lWr, C, mW*0.72, 11);
  if (rEl && rWr) drawMuscle(rEl, rWr, C, mW*0.72, 11);

  // Pecs
  if (lSh && rSh && lHi) {
    const cc = mid(lSh, rSh); cc.y += dst(lSh, rSh)*0.18;
    const cb = {x:cc.x, y:cc.y+dst(lSh,rSh)*0.42};
    drawMuscle(lSh, {x:cc.x-3*sc, y:cb.y}, C, mW*1.05, 15);
    drawMuscle(rSh, {x:cc.x+3*sc, y:cb.y}, C, mW*1.05, 15);
  }

  // Abs
  if (lSh && rSh && lHi && rHi) {
    const tA = {x:mid(lSh,rSh).x, y:mid(lSh,rSh).y+dst(lSh,rSh)*0.38};
    const bA = mid(lHi, rHi);
    const aw = dst(lHi,rHi)*0.16;
    for (let i=0; i<4; i++) {
      const ay  = lrp(tA.y, bA.y, i/4);
      const ay2 = lrp(tA.y, bA.y, (i+0.78)/4);
      ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=9;
      ctx.fillStyle=C; ctx.globalAlpha=0.32;
      ctx.beginPath(); ctx.ellipse(tA.x-aw, (ay+ay2)/2, aw*0.62, (ay2-ay)*0.44, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(tA.x+aw, (ay+ay2)/2, aw*0.62, (ay2-ay)*0.44, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // Traps
  if (lSh && rSh) {
    const tr = {x:mid(lSh,rSh).x, y:lSh.y - dst(lSh,rSh)*0.22};
    ctx.save(); ctx.shadowColor=CM; ctx.shadowBlur=13;
    ctx.fillStyle=CM; ctx.globalAlpha=0.38;
    ctx.beginPath();
    ctx.moveTo(tr.x, tr.y);
    ctx.lineTo(lSh.x-4*sc, lSh.y);
    ctx.lineTo(lSh.x, lSh.y+dst(lSh,rSh)*0.22);
    ctx.lineTo(tr.x, tr.y+dst(lSh,rSh)*0.32);
    ctx.lineTo(rSh.x, rSh.y+dst(lSh,rSh)*0.22);
    ctx.lineTo(rSh.x+4*sc, rSh.y);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  if (lHi && rHi && lKn) {
    const pc = mid(lHi,rHi);
    drawMuscle(lHi, {x:pc.x-7*sc,y:pc.y+dst(lHi,rHi)*0.38}, CM, mW*1.15, 15);
    drawMuscle(rHi, {x:pc.x+7*sc,y:pc.y+dst(lHi,rHi)*0.38}, CM, mW*1.15, 15);
  }
  if (lHi && lKn) drawMuscle(lHi, lKn, C, mW*1.08, 15);
  if (rHi && rKn) drawMuscle(rHi, rKn, C, mW*1.08, 15);
  if (lHi && lKn) drawMuscle({x:lHi.x+5*sc,y:lHi.y+3*sc},{x:lKn.x+4*sc,y:lKn.y-3*sc}, CD, mW*0.65, 9);
  if (rHi && rKn) drawMuscle({x:rHi.x-5*sc,y:rHi.y+3*sc},{x:rKn.x-4*sc,y:rKn.y-3*sc}, CD, mW*0.65, 9);
  if (lKn && lAn) drawMuscle(lKn, lAn, C, mW*0.8, 11);
  if (rKn && rAn) drawMuscle(rKn, rAn, C, mW*0.8, 11);
}

// ══════════════════════════════════════════════════════════════════
//  CIRCULATORY SYSTEM
// ══════════════════════════════════════════════════════════════════
function drawVessel(pts, col, w, blur) {
  if (pts.length < 2) return;
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length-1; i++) {
    const cpx=(pts[i].x+pts[i+1].x)/2, cpy=(pts[i].y+pts[i+1].y)/2;
    ctx.quadraticCurveTo(pts[i].x,pts[i].y,cpx,cpy);
  }
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  ctx.stroke(); ctx.restore();
}

function drawCirculatory(kps, cw, ch) {
  heartPhase += 0.055;
  const beat = Math.pow(Math.max(0, Math.sin(heartPhase*1.75)), 3)*0.38 + 0.62;
  const g = i => gkp(kps, i, cw, ch);
  const sc = cw/640;
  const ART='#ff2244', VEN='#3355ff', off=4*sc;

  const nose=g(KP.NOSE), lSh=g(KP.LSH), rSh=g(KP.RSH);
  const lEl=g(KP.LEL), rEl=g(KP.REL), lWr=g(KP.LWR), rWr=g(KP.RWR);
  const lHi=g(KP.LHI), rHi=g(KP.RHI), lKn=g(KP.LKN), rKn=g(KP.RKN);
  const lAn=g(KP.LAN), rAn=g(KP.RAN);
  const vW = Math.max(2, 3.2*sc);

  // Heart
  if (lSh && rSh) {
    const hc = {x:lrp(lSh.x,rSh.x,0.54), y:lSh.y+dst(lSh,rSh)*0.28};
    const hr = dst(lSh,rSh)*0.14*beat;
    ctx.save(); ctx.shadowColor=ART; ctx.shadowBlur=18*beat;
    ctx.fillStyle=ART; ctx.globalAlpha=0.52*beat;
    ctx.beginPath();
    ctx.moveTo(hc.x, hc.y+hr*0.75);
    ctx.bezierCurveTo(hc.x-hr*1.5,hc.y-hr,   hc.x-hr*2,hc.y-hr*0.4,  hc.x-hr,  hc.y-hr*1.4);
    ctx.bezierCurveTo(hc.x-hr*0.3,hc.y-hr*1.9, hc.x,    hc.y-hr*1.4, hc.x,     hc.y-hr*0.7);
    ctx.bezierCurveTo(hc.x,       hc.y-hr*1.4, hc.x+hr*0.3,hc.y-hr*1.9,hc.x+hr,hc.y-hr*1.4);
    ctx.bezierCurveTo(hc.x+hr*2,  hc.y-hr*0.4, hc.x+hr*1.5,hc.y-hr,  hc.x,     hc.y+hr*0.75);
    ctx.closePath(); ctx.fill(); ctx.restore();
    if (nose) drawVessel([hc, {x:(hc.x+nose.x)/2,y:(hc.y+nose.y)/2}, nose], ART, vW*1.3, 11);
    if (lSh) drawVessel([hc, mid(hc,lSh), lSh], VEN, vW, 7);
    if (rSh) drawVessel([hc, mid(hc,rSh), rSh], VEN, vW, 7);
  }

  if (lSh&&lEl) drawVessel([lSh,lEl],ART,vW*1.0,9);
  if (lEl&&lWr) drawVessel([lEl,lWr],ART,vW*0.85,7);
  if (rSh&&rEl) drawVessel([rSh,rEl],ART,vW*1.0,9);
  if (rEl&&rWr) drawVessel([rEl,rWr],ART,vW*0.85,7);
  if (lSh&&lEl) drawVessel([{x:lSh.x+off,y:lSh.y},{x:lEl.x+off,y:lEl.y}],VEN,vW*0.75,6);
  if (rSh&&rEl) drawVessel([{x:rSh.x-off,y:rSh.y},{x:rEl.x-off,y:rEl.y}],VEN,vW*0.75,6);

  if (lSh&&rSh&&lHi&&rHi) {
    const ct=mid(lSh,rSh), pl=mid(lHi,rHi);
    drawVessel([ct,{x:ct.x,y:(ct.y+pl.y)/2},pl],ART,vW*1.25,11);
    drawVessel([{x:ct.x+off,y:ct.y},{x:pl.x+off,y:pl.y}],VEN,vW*0.9,7);
  }
  if (lHi&&lKn) drawVessel([lHi,mid(lHi,lKn),lKn],ART,vW,9);
  if (rHi&&rKn) drawVessel([rHi,mid(rHi,rKn),rKn],ART,vW,9);
  if (lKn&&lAn) drawVessel([lKn,mid(lKn,lAn),lAn],ART,vW*0.8,7);
  if (rKn&&rAn) drawVessel([rKn,mid(rKn,rAn),rAn],ART,vW*0.8,7);
  if (lHi&&lKn) drawVessel([{x:lHi.x+off,y:lHi.y},{x:lKn.x+off,y:lKn.y}],VEN,vW*0.7,5);
  if (rHi&&rKn) drawVessel([{x:rHi.x-off,y:rHi.y},{x:rKn.x-off,y:rKn.y}],VEN,vW*0.7,5);

  [lSh,rSh,lHi,rHi,lKn,rKn].forEach((n,i) => {
    if (!n) return;
    const p = (Math.sin(heartPhase*1.75+i*1.2)+1)/2;
    ctx.save(); ctx.shadowColor=ART; ctx.shadowBlur=10*p;
    ctx.fillStyle=ART; ctx.globalAlpha=0.45*p;
    const r = Math.max(3,5*sc)*(0.7+0.3*p);
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════════════
//  NERVOUS SYSTEM
// ══════════════════════════════════════════════════════════════════
function drawNerve(a, b, col, w, blur) {
  if (!a||!b) return;
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=w;
  ctx.setLineDash([6,4]); ctx.lineDashOffset=-(Date.now()/55)%10;
  ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(a.x,a.y);
  const cp={x:lrp(a.x,b.x,0.5)+(b.y-a.y)*0.07,y:lrp(a.y,b.y,0.5)-(b.x-a.x)*0.07};
  ctx.quadraticCurveTo(cp.x,cp.y,b.x,b.y);
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function drawNervous(kps, cw, ch) {
  const g = i => gkp(kps, i, cw, ch);
  const sc = cw/640;
  const C='#ffe855', CB='#ffaa00';
  const nW = Math.max(1.5, 2.4*sc);
  const t = Date.now();

  const nose=g(KP.NOSE), lSh=g(KP.LSH), rSh=g(KP.RSH);
  const lEl=g(KP.LEL), rEl=g(KP.REL), lWr=g(KP.LWR), rWr=g(KP.RWR);
  const lHi=g(KP.LHI), rHi=g(KP.RHI), lKn=g(KP.LKN), rKn=g(KP.RKN);
  const lAn=g(KP.LAN), rAn=g(KP.RAN);

  // Brain
  if (nose && lSh && rSh) {
    const br = dst(lSh,rSh)*0.24;
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=20;
    ctx.strokeStyle=C; ctx.lineWidth=nW*1.2;
    ctx.beginPath(); ctx.arc(nose.x-br*0.32,nose.y-br*0.78,br*0.62,Math.PI*0.8,Math.PI*2.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(nose.x+br*0.32,nose.y-br*0.78,br*0.62,Math.PI*0.8,Math.PI*2.2); ctx.stroke();
    ctx.lineWidth=nW*0.45; ctx.globalAlpha=0.45;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(nose.x-br*0.28,nose.y-br*0.78,br*0.28+i*6*sc,Math.PI,Math.PI*2); ctx.stroke(); }
    ctx.restore();
    const neck = lSh&&rSh ? {x:mid(lSh,rSh).x,y:mid(lSh,rSh).y-dst(lSh,rSh)*0.28} : nose;
    drawNerve(nose, neck, C, nW*1.2, 13);
  }

  // Spinal cord
  if (lSh&&rSh&&lHi&&rHi) {
    const ts=mid(lSh,rSh), bs=mid(lHi,rHi);
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=11;
    ctx.strokeStyle=C; ctx.lineWidth=nW*1.5;
    ctx.setLineDash([8,4]); ctx.lineDashOffset=-(t/48)%12;
    ctx.beginPath(); ctx.moveTo(ts.x,ts.y); ctx.lineTo(bs.x,bs.y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    const roots=6, side=dst(lSh,rSh)*0.26;
    for(let i=0;i<roots;i++) {
      const r=(i+0.5)/roots;
      const rx=lrp(ts.x,bs.x,r), ry=lrp(ts.y,bs.y,r);
      drawNerve({x:rx,y:ry},{x:rx-side,y:ry},C,nW*0.75,7);
      drawNerve({x:rx,y:ry},{x:rx+side,y:ry},C,nW*0.75,7);
    }
  }

  drawNerve(lSh,lEl,C,nW*1.05,9); drawNerve(rSh,rEl,C,nW*1.05,9);
  drawNerve(lEl,lWr,C,nW,8);      drawNerve(rEl,rWr,C,nW,8);
  if(lWr) for(let a=-0.4;a<=0.4;a+=0.2) drawNerve(lWr,{x:lWr.x+Math.cos(a+Math.PI*.5)*22*sc,y:lWr.y+Math.sin(a+Math.PI*.5)*22*sc},C,nW*0.55,5);
  if(rWr) for(let a=-0.4;a<=0.4;a+=0.2) drawNerve(rWr,{x:rWr.x+Math.cos(a-Math.PI*.5)*22*sc,y:rWr.y+Math.sin(a-Math.PI*.5)*22*sc},C,nW*0.55,5);
  drawNerve(lHi,lKn,CB,nW*1.15,11); drawNerve(rHi,rKn,CB,nW*1.15,11);
  drawNerve(lKn,lAn,C,nW,8);        drawNerve(rKn,rAn,C,nW,8);

  [nose,lSh,rSh,lEl,rEl,lHi,rHi,lKn,rKn].forEach((n,i) => {
    if(!n) return;
    const p=(Math.sin(t/280+i*1.25)+1)/2;
    ctx.save(); ctx.shadowColor=C; ctx.shadowBlur=14*p;
    ctx.fillStyle=C; ctx.globalAlpha=0.45+0.5*p;
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.max(2.5,4.5*sc)*(0.7+0.3*p),0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════════════
//  CONFIDENCE & SMOOTHING
// ══════════════════════════════════════════════════════════════════
let smoothedPoses = [];
function smoothPoses(newPoses) {
  if (newPoses.length === 0) { smoothedPoses = []; return []; }
  if (smoothedPoses.length === 0) { smoothedPoses = newPoses; return newPoses; }
  const ALPHA = 0.55; // smoothing factor
  return newPoses.map((pose, pi) => {
    if (!smoothedPoses[pi]) return pose;
    return {
      ...pose,
      keypoints: pose.keypoints.map((kp, ki) => {
        const prev = smoothedPoses[pi]?.keypoints[ki];
        if (!prev) return kp;
        return {
          ...kp,
          x: lrp(prev.x, kp.x, ALPHA),
          y: lrp(prev.y, kp.y, ALPHA),
          score: lrp(prev.score||0, kp.score||0, ALPHA)
        };
      })
    };
  });
}

// ══════════════════════════════════════════════════════════════════
//  RENDER FRAME
// ══════════════════════════════════════════════════════════════════
function renderPoses(poses) {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  if (!poses || poses.length === 0) {
    document.getElementById('np').classList.remove('h');
    document.getElementById('h-bod').textContent = '0';
    document.getElementById('h-pose').textContent = '--';
    document.getElementById('h-conf').textContent = '--';
    document.getElementById('cf').style.height = '0%';
    document.getElementById('cpct').textContent = '0%';
    document.getElementById('sdot').className = 'dot yellow';
    document.getElementById('stxt').textContent = 'SCANNING';
    return;
  }

  document.getElementById('np').classList.add('h');
  document.getElementById('h-bod').textContent = poses.length;
  document.getElementById('sdot').className = 'dot';
  document.getElementById('stxt').textContent = 'TRACKING';
  document.getElementById('h-pose').textContent = 'DETECTED';

  let maxConf = 0;
  poses.forEach(pose => {
    const kps = pose.keypoints;
    const valid = kps.filter(k => k.score > 0.2);
    const avgConf = valid.length > 0 ? valid.reduce((s,k)=>s+k.score,0)/valid.length : 0;
    maxConf = Math.max(maxConf, avgConf);
    const cw2 = canvas.width, ch2 = canvas.height;
    switch(activeSystem) {
      case 'skeleton':    drawSkeleton(kps, cw2, ch2);    break;
      case 'muscular':    drawMuscular(kps, cw2, ch2);    break;
      case 'circulatory': drawCirculatory(kps, cw2, ch2); break;
      case 'nervous':     drawNervous(kps, cw2, ch2);     break;
    }
  });

  smoothedPoses = poses;
  const pct = Math.round(maxConf * 100);
  document.getElementById('h-conf').textContent = pct + '%';
  document.getElementById('cf').style.height = pct + '%';
  document.getElementById('cpct').textContent = pct + '%';
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
function setStatus(text, pct) {
  document.getElementById('lst').textContent = text;
  document.getElementById('lb').style.width = pct + '%';
}

async function init() {
  setStatus('Requesting camera access...', 8);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} }, audio:false
    });
    video.srcObject = stream;
    setStatus('Camera connected. Preloading anatomy images...', 22);

    await new Promise(r => video.onloadedmetadata = r);
    video.play();

    await preloadImages();
    setStatus('Anatomy images loaded. Loading AI model...', 42);

    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {
        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
        enableSmoothing: true,
        enableTracking: true,
        trackerType: poseDetection.TrackerType.BoundingBox
      }
    );

    setStatus('Warming up neural network...', 78);
    const tc = document.createElement('canvas'); tc.width=192; tc.height=192;
    await detector.estimatePoses(tc);

    setStatus('System online.', 100);
    await new Promise(r => setTimeout(r, 450));
    document.getElementById('loading').classList.add('h');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    document.getElementById('h-res').textContent = video.videoWidth + 'x' + video.videoHeight;

    async function loop() {
      if (video.readyState >= 2 && detector) {
        const raw = await detector.estimatePoses(video, { maxPoses:3, flipHorizontal:false });
        const poses = smoothPoses(raw);
        renderPoses(poses);
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime > 1000) {
          fps = Math.round(frameCount*1000/(now-lastFpsTime));
          document.getElementById('h-fps').textContent = fps;
          frameCount = 0; lastFpsTime = now;
        }
      }
      requestAnimationFrame(loop);
    }
    loop();

  } catch(err) {
    setStatus('Error: ' + err.message, 0);
    document.getElementById('sdot').className = 'dot red';
    document.getElementById('stxt').textContent = 'ERROR';
    document.getElementById('lb').style.background = '#f44';
    console.error(err);
  }
}

// ══════════════════════════════════════════════════════════════════
//  UI CONTROLS
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll('.sb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSystem = btn.dataset.s;
    document.getElementById('h-sys').textContent = activeSystem.toUpperCase();
  });
});

document.getElementById('aslider').addEventListener('input', e => {
  overlayAlpha = parseInt(e.target.value) / 100;
  document.getElementById('aval').textContent = e.target.value + '%';
});

init();
</script>
